.form-err { color: oklch(0.55 0.18 25); font-size: 12px; }

.events-layout { display: grid; grid-template-columns: 320px 1fr; gap: 18px; min-height: 380px; }
.events-add { background: var(--paper-2); border: 1px solid var(--line); border-radius: var(--radius-lg); overflow: hidden; align-self: start; position: sticky; top: 0; }
.events-add-head { padding: 12px 16px; background: var(--ink); color: var(--paper); display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; letter-spacing: -0.01em; }
body.dark .events-add-head { background: var(--paper); color: var(--ink); }
.events-add-head svg { width: 13px; height: 13px; }
.events-add-body { padding: 14px; display: flex; flex-direction: column; gap: 10px; }
.events-add-title { background: var(--paper); border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; font-size: 14px; font-weight: 500; width: 100%; }
.events-add-title:focus { border-color: var(--ink-3); box-shadow: 0 0 0 3px color-mix(in srgb, var(--ink) 6%, transparent); }
.events-add-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.events-add-field { display: flex; align-items: center; gap: 6px; background: var(--paper); border: 1px solid var(--line); border-radius: 8px; padding: 6px 8px; font-size: 12px; }
.events-add-field svg { width: 12px; height: 12px; color: var(--ink-3); flex-shrink: 0; }
.events-add-field input { flex: 1; min-width: 0; font-size: 12px; padding: 2px 0; }
.events-add-note { background: var(--paper); border: 1px solid var(--line); border-radius: 8px; padding: 7px 10px; font-size: 12px; width: 100%; }
.events-add-colours { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.events-add-colour-label { font-size: 10px; color: var(--ink-3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
.events-add-colour-swatches { display: flex; gap: 4px; }
.events-colour-dot { width: 18px; height: 18px; border-radius: 50%; border: 2px solid transparent; transition: transform 0.12s ease; }
.events-colour-dot:hover { transform: scale(1.15); }
.events-colour-dot.is-active { border-color: var(--paper); box-shadow: 0 0 0 2px var(--ink); }
.events-add-submit { margin-left: auto; padding: 6px 12px; font-size: 12px; }
.events-add-submit:disabled { opacity: 0.4; cursor: not-allowed; }
.events-list { display: flex; flex-direction: column; gap: 8px; min-width: 0; }
.events-section-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-3); margin: 6px 0 0; padding: 0 2px; }
.events-empty { padding: 40px 20px; text-align: center; color: var(--ink-3); font-size: 13px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
.events-empty svg { width: 28px; height: 28px; opacity: 0.5; }
.events-count { font-size: 11.5px; color: var(--ink-3); }
.ev-card { display: grid; grid-template-columns: 58px 1fr auto; gap: 14px; align-items: center; padding: 12px 14px; background: var(--paper); border: 1px solid var(--line); border-radius: 12px; border-left: 4px solid var(--ev-c, var(--ink-4)); transition: box-shadow 0.15s ease, transform 0.15s ease; }
.ev-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.06); transform: translateY(-1px); }
.ev-card.is-faded { opacity: 0.55; }
.ev-date { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 6px 0; background: color-mix(in srgb, var(--ev-c, var(--ink-4)) 12%, transparent); border-radius: 8px; line-height: 1.05; }
.ev-date-month { font-size: 9px; font-weight: 700; color: var(--ev-c, var(--ink-3)); letter-spacing: 0.08em; }
.ev-date-day { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; margin: 1px 0; }
.ev-date-weekday { font-size: 9px; color: var(--ink-3); }
.ev-body { min-width: 0; }
.ev-title { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; }
.ev-meta { font-size: 11px; color: var(--ink-3); margin-top: 2px; }
.ev-note { font-size: 12px; color: var(--ink-2); margin-top: 6px; line-height: 1.4; }
.ev-actions { display: flex; align-items: center; gap: 2px; align-self: start; }
.ev-edit { width: 30px; height: 30px; border-radius: 8px; display: grid; place-items: center; color: var(--ink-3); opacity: 0; transition: opacity 0.15s ease, background 0.15s ease, color 0.15s ease; }
.ev-card:hover .ev-edit { opacity: 1; }
.ev-edit:hover { color: var(--accent); background: color-mix(in srgb, var(--accent) 12%, transparent); }
.ev-edit svg { width: 14px; height: 14px; }
.ev-delete { width: 30px; height: 30px; border-radius: 8px; display: grid; place-items: center; color: var(--ink-3); opacity: 0; transition: opacity 0.15s ease, background 0.15s ease, color 0.15s ease; }
.ev-card:hover .ev-delete { opacity: 1; }
.ev-delete:hover { color: oklch(0.55 0.18 25); background: color-mix(in srgb, oklch(0.65 0.18 25) 12%, transparent); }
.ev-delete svg { width: 14px; height: 14px; }
.ev-card.is-editing { box-shadow: 0 0 0 2px var(--ev-c, var(--accent)); }
.ev-card.is-editing .ev-edit, .ev-card.is-editing .ev-delete { opacity: 1; }

@media (max-width: 760px) {
  .edit-person-grid, .events-layout { grid-template-columns: 1fr; }
  .ep-day-cols { grid-template-columns: repeat(2, 1fr); }
  .events-add { position: static; }
}

.floating-now { position: fixed; bottom: 18px; right: 18px; padding: 10px 16px 10px 12px; background: var(--ink); color: var(--paper); border-radius: 999px; box-shadow: 0 6px 24px rgba(0,0,0,0.18); display: flex; align-items: center; gap: 10px; font-size: 12.5px; z-index: 30; cursor: pointer; font-weight: 500; transition: transform 0.18s ease; }
.floating-now:hover { transform: translateY(-1px); }
.floating-now .pulse { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: pulse 1.6s ease-in-out infinite; }
@keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 color-mix(in srgb, var(--accent) 60%, transparent); } 50% { box-shadow: 0 0 0 6px color-mix(in srgb, var(--accent) 0%, transparent); } }
.drop-indicator { position: absolute; left: 4px; right: 4px; height: 3px; background: var(--accent); border-radius: 2px; z-index: 8; pointer-events: none; box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 20%, transparent); }

body.dark .wk-block:not(.is-break), body.dark .dl-row-block:not(.is-break), body.dark .bn-now-block, body.dark .cmp-block:not(.is-break) { background: color-mix(in srgb, var(--bl-ink, currentColor) 28%, var(--paper)); color: color-mix(in srgb, var(--bl-bg, currentColor) 92%, white); box-shadow: 0 1px 2px rgba(0,0,0,0.35), inset 0 0 0 1px color-mix(in srgb, var(--bl-ink, currentColor) 45%, transparent); }
body.dark .wk-block:not(.is-break)::before, body.dark .dl-row-block:not(.is-break)::before { background: color-mix(in srgb, var(--bl-bg, currentColor) 85%, white); }
body.dark .wk-block.is-online { border-color: color-mix(in srgb, var(--bl-bg, currentColor) 60%, transparent); }
body.dark .bl-code, body.dark .cmp-block .bl-code { opacity: 0.85; }
body.dark .bl-meta { color: color-mix(in srgb, var(--bl-bg, currentColor) 70%, var(--ink-3)); }
body.dark[data-block-style="outline"] .wk-block:not(.is-break), body.dark[data-block-style="outline"] .dl-row-block:not(.is-break) { background: var(--paper); color: color-mix(in srgb, var(--bl-bg, currentColor) 92%, white); box-shadow: inset 0 0 0 1.5px color-mix(in srgb, var(--bl-bg, currentColor) 55%, transparent); }
body.dark .wk-block.is-break, body.dark .dl-row.is-break .dl-row-block, body.dark .cmp-block.is-break { background: repeating-linear-gradient(45deg, var(--paper-2), var(--paper-2) 6px, var(--paper-3) 6px, var(--paper-3) 12px); }
body.dark .bn-bar:not(.is-today) .bn-bar-fill { filter: brightness(0.55) saturate(0.8); }
body.dark .cmp-head-chip { filter: brightness(0.78) saturate(0.85); }
@keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.slide-up { animation: slideUp 0.3s ease both; }
@media (max-width: 900px) {
  .app { grid-template-columns: 64px 1fr; }
  .app .person-meta, .app .brand-name, .app .sidebar-section-label, .app .sidebar-btn span { display: none; }
  .bento-row { flex-direction: column; }
  .bento-col { flex-direction: column; }
  .toolbar { flex-wrap: wrap; }
  .search-box { min-width: 0; flex: 1; }
}
@media (max-width: 640px) {
  /* Phone layout — additive only; desktop (>640px) is untouched. */

  /* Sidebar → horizontal people strip on top */
  .app { display: block; }
  .sidebar {
    position: sticky; top: 0; z-index: 25;
    flex-direction: row; align-items: center;
    width: 100%; height: auto;
    border-right: none; border-bottom: 1px solid var(--line);
    overflow-x: auto; overflow-y: hidden;
    padding: 8px 10px; gap: 8px;
  }
  .sidebar-head { display: none; }                 /* brand + collapse toggle */
  .person-list { flex-direction: row; gap: 6px; }
  .person-list > button { display: none; }          /* "Add person" chip */
  .sidebar > button:nth-of-type(2),                 /* Edit */
  .sidebar > button:nth-of-type(3) { display: none; } /* Server */
  .sidebar-foot { margin-top: 0; flex-direction: row; }

  /* Toolbar → drop Search + Save/Export/Edit */
  .search-box { display: none; }
  .tb-right { display: none; }
  .toolbar { padding: 10px 12px; gap: 8px; }
  .toolbar-title { font-size: 16px; }
  .view-switch { margin-left: auto !important; }    /* override inline marginLeft:16 */

  /* Week grid → fit all 5 days, no scroll */
  .body { padding: 12px 8px 56px; overflow-x: hidden; }
  .wk, .wk.cmp { min-width: 0; }
  .wk { grid-template-columns: 40px repeat(5, 1fr); }
  .wk-time-label { font-size: 9.5px; padding: 4px; }
  .wk-header { padding: 8px 4px 6px; }
  .wk-header .day-name { font-size: 8.5px; letter-spacing: 0.04em; }
  .wk-header .day-num { font-size: 15px; }
  .wk-block { left: 2px; right: 2px; padding: 5px; border-radius: 8px; }
  .bl-code { font-size: 8.5px; }
  .bl-name { font-size: 10.5px; line-height: 1.15; }
  .bl-meta { font-size: 8.5px; gap: 3px; }

  /* Modals */
  .field-grid { grid-template-columns: repeat(2, 1fr); }
  .overlay { padding: 16px 12px 32px; }
}
/* Server status pill */
.srv-pill { display:inline-flex; align-items:center; gap:6px; padding:7px 12px; border-radius:10px; font-size:12.5px; font-weight:500; background:var(--paper-2); border:1px solid var(--line); color:var(--ink-2); cursor:pointer; transition: background 0.15s ease; }
.srv-pill:hover { background:var(--paper-3); }
.srv-pill.is-ok { background:color-mix(in srgb, var(--green) 14%, transparent); color:var(--green); border-color:color-mix(in srgb, var(--green) 30%, var(--line)); }
.srv-pill.is-saving { color:var(--amber); }
.srv-pill.is-err { background:color-mix(in srgb, var(--accent) 14%, transparent); color:var(--accent); border-color:color-mix(in srgb, var(--accent) 30%, var(--line)); }
.srv-dot { width:7px; height:7px; border-radius:50%; background:currentColor; }
.srv-pill svg { width:13px; height:13px; }

/* Server modal */
.srv-row { display:flex; flex-direction:column; gap:5px; margin-bottom:12px; }
.srv-row label { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.06em; color:var(--ink-3); }
.srv-test-result { padding:9px 12px; border-radius:8px; font-size:12px; margin-bottom:10px; }
.srv-test-result.ok { background:color-mix(in srgb, var(--green) 14%, transparent); color:var(--green); }
.srv-test-result.err { background:color-mix(in srgb, var(--accent) 14%, transparent); color:var(--accent); }
.srv-info { font-size:11.5px; color:var(--ink-3); line-height:1.5; padding:10px 12px; background:var(--paper-2); border-radius:8px; margin-bottom:14px; }

/* Font preview area in EditPerson */
.font-row { display:flex; gap:6px; }
.font-row .field-input { flex:1; min-width:0; }
.font-test-btn, .font-clear-btn { padding:7px 11px; border-radius:8px; border:1px solid var(--line); background:var(--paper); font-size:12px; white-space:nowrap; flex-shrink:0; }
.font-test-btn:hover, .font-clear-btn:hover { background:var(--paper-2); }
.font-clear-btn { color:var(--accent); }
.font-preview { margin-top:8px; padding:10px 12px; background:var(--paper); border:1px solid var(--line); border-radius:8px; font-size:14px; }
.font-preview-sample { padding:4px 8px; border-radius:5px; display:inline-block; }
.font-preview-status { font-size:10.5px; margin-top:6px; }
.font-preview-status.ok { color:var(--green); }
.font-preview-status.err { color:var(--accent); }

/* Events: interested chips */
.ev-interested { display:flex; flex-wrap:wrap; gap:5px; margin-top:8px; align-items:center; }
.ev-interested-label { font-size:10px; color:var(--ink-3); text-transform:uppercase; letter-spacing:0.06em; font-weight:600; margin-right:2px; }
.ev-interest-chip { display:inline-flex; align-items:center; gap:4px; padding:2px 4px 2px 9px; border-radius:999px; background:var(--paper-2); border:1px solid var(--line); font-size:11px; color:var(--ink-2); }
.ev-interest-chip button { width:16px; height:16px; border-radius:50%; display:grid; place-items:center; color:var(--ink-3); font-size:10px; line-height:1; }
.ev-interest-chip button:hover { color:var(--accent); background:color-mix(in srgb, var(--accent) 14%, transparent); }
.ev-interest-add { padding:2px 9px; border-radius:999px; border:1px dashed var(--line-2); font-size:11px; color:var(--ink-3); background:transparent; cursor:pointer; }
.ev-interest-add:hover { color:var(--ink); border-color:var(--ink-3); }
.ev-interest-input { padding:2px 8px; border-radius:999px; border:1px solid var(--ink-3); background:var(--paper); font-size:11px; outline:none; width:120px; }

/* End-time field in events add */
.events-add-meta.three { grid-template-columns: 1fr 1fr 1fr; }

/* Capture area background ensures html2canvas gets a clean bg */
#capture-area { background: var(--paper); border-radius: var(--radius-lg); padding: 4px; min-width: 0; }

/* Avatars with profile-picture image */
.avatar.has-image { padding: 0; background: var(--paper-2) !important; overflow: hidden; }
.avatar.has-image img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; display: block; }
.ep-preview-avatar.has-image { padding: 0; overflow: hidden; background: var(--paper-2) !important; }
.ep-preview-avatar.has-image img { width: 100%; height: 100%; object-fit: cover; display: block; border-radius: 50%; }
.cmp-head-chip.has-image { padding: 0; overflow: hidden; border-color: transparent; }
.cmp-head-chip.has-image img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; display: block; }

/* Avatar upload control in EditPerson */
.ep-avatar-control { display: flex; align-items: center; gap: 12px; padding: 10px 12px; background: var(--paper); border: 1px solid var(--line); border-radius: 10px; }
.ep-avatar-preview { width: 56px; height: 56px; border-radius: 50%; background: var(--paper-2); display: grid; place-items: center; font-weight: 700; font-size: 16px; color: var(--ink-2); overflow: hidden; flex-shrink: 0; }
.ep-avatar-preview img { width: 100%; height: 100%; object-fit: cover; display: block; }
.ep-avatar-actions { display: flex; flex-direction: column; gap: 5px; min-width: 0; flex: 1; }
.ep-avatar-buttons { display: flex; gap: 6px; flex-wrap: wrap; }
.ep-avatar-btn { padding: 6px 10px; border-radius: 8px; border: 1px solid var(--line); background: var(--paper-2); font-size: 11.5px; cursor: pointer; }
.ep-avatar-btn:hover { background: var(--paper-3); }
.ep-avatar-btn.danger { color: var(--accent); border-color: color-mix(in srgb, var(--accent) 30%, var(--line)); }
.ep-avatar-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.ep-avatar-status { font-size: 10.5px; color: var(--ink-3); }
.ep-avatar-status.ok  { color: var(--green); }
.ep-avatar-status.err { color: var(--accent); }

/* Circular avatar cropper */
.avatar-cropper { display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 4px 0; }
.avatar-cropper-stage { position: relative; border-radius: 12px; overflow: hidden; background: var(--paper-2); cursor: grab; touch-action: none; user-select: none; }
.avatar-cropper-stage:active { cursor: grabbing; }
.avatar-cropper-stage canvas { display: block; }
.avatar-cropper-mask { position: absolute; inset: 0; border-radius: 50%; box-shadow: 0 0 0 9999px color-mix(in srgb, var(--paper) 62%, transparent); pointer-events: none; }
.avatar-cropper-zoom { display: flex; align-items: center; gap: 10px; width: 280px; color: var(--ink-3); }
.avatar-cropper-zoom svg { width: 15px; height: 15px; flex-shrink: 0; }
.avatar-cropper-zoom input[type="range"] { flex: 1; accent-color: var(--accent); }
.avatar-cropper-hint { font-size: 11.5px; color: var(--ink-3); }

/* Event/Exam type segmented control */
.ev-type-seg { display: flex; padding: 3px; background: var(--paper); border: 1px solid var(--line); border-radius: 9px; margin-bottom: 4px; }
.ev-type-seg button { flex: 1; padding: 6px 10px; border-radius: 7px; font-size: 12px; font-weight: 500; color: var(--ink-3); display: flex; align-items: center; justify-content: center; gap: 5px; }
.ev-type-seg button svg { width: 12px; height: 12px; }
.ev-type-seg button.is-active { background: var(--ink); color: var(--paper); }
body.dark .ev-type-seg button.is-active { background: var(--paper); color: var(--ink); }

/* Sub-tab filter pills in events list */
.ev-filter-tabs { display: flex; gap: 4px; padding: 2px; background: var(--paper-2); border-radius: 9px; align-self: flex-start; margin-bottom: 4px; border: 1px solid var(--line); }
.ev-filter-tabs button { padding: 4px 10px; border-radius: 7px; font-size: 11.5px; font-weight: 500; color: var(--ink-3); }
.ev-filter-tabs button.is-active { background: var(--paper); color: var(--ink); box-shadow: 0 1px 2px rgba(0,0,0,0.06); }

/* EXAM badge */
.ev-exam-badge { display: inline-flex; align-items: center; gap: 3px; font-size: 9px; font-weight: 700; padding: 1px 6px; border-radius: 999px; background: color-mix(in srgb, var(--accent) 18%, transparent); color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase; margin-left: 6px; vertical-align: middle; }
.ev-exam-badge svg { width: 9px; height: 9px; }
.ev-meta-room { display: inline-flex; align-items: center; gap: 4px; }
.ev-meta-room svg { width: 11px; height: 11px; }

/* Linked-class dropdown */
.events-add-link { background: var(--paper); border: 1px solid var(--line); border-radius: 8px; padding: 7px 10px; font-size: 12px; width: 100%; cursor: pointer; }
.events-add-link:focus { border-color: var(--ink-3); }

/* Class-code type-ahead (type, Tab to complete) */
.events-add-typeahead { position: relative; width: 100%; }
.events-add-typeahead .ta-input { background: transparent; cursor: text; position: relative; z-index: 1; }
.events-add-ghost { position: absolute; inset: 0; display: flex; align-items: center; padding: 7px 10px; font-size: 12px; font-family: inherit; white-space: pre; overflow: hidden; pointer-events: none; z-index: 0; }
.events-add-ghost .ta-typed { visibility: hidden; }
.events-add-ghost .ta-ghost { color: var(--ink-4); }
.events-add-typeahead .ta-hint { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); font-size: 9px; font-family: var(--font-mono); color: var(--ink-4); background: var(--paper-2); border: 1px solid var(--line); border-radius: 4px; padding: 1px 4px; pointer-events: none; z-index: 2; }

/* ── Exams view ── */
.exams { display: flex; flex-direction: column; gap: 18px; max-width: 920px; }
.exams-hero { display: flex; align-items: center; gap: 16px; padding: 18px 22px; border-radius: var(--radius-lg); background: linear-gradient(135deg, color-mix(in srgb, var(--accent) 18%, var(--paper)) 0%, var(--paper) 70%); border: 1px solid var(--line); }
.exams-hero-icon { width: 44px; height: 44px; border-radius: 12px; display: grid; place-items: center; background: var(--accent); color: white; flex-shrink: 0; }
.exams-hero-icon svg { width: 22px; height: 22px; }
.exams-hero-text { flex: 1; min-width: 0; }
.exams-hero-eyebrow { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); }
.exams-hero-title { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; margin-top: 3px; }
.exams-hero-meta { font-size: 12px; color: var(--ink-3); margin-top: 4px; font-family: var(--font-mono); }

.exams-section { display: flex; flex-direction: column; gap: 8px; }
.exams-section-head { display: flex; align-items: baseline; justify-content: space-between; padding: 0 4px 2px; }
.exams-section-name { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-3); }
.exams-section-count { font-size: 11px; color: var(--ink-4); font-family: var(--font-mono); }

.exam-card { display: grid; grid-template-columns: 64px 1fr auto; gap: 16px; align-items: stretch; padding: 14px 16px; background: var(--paper); border: 1px solid var(--line); border-radius: 14px; border-left: 4px solid var(--ev-c, var(--accent)); transition: box-shadow 0.15s ease, transform 0.15s ease; }
.exam-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.06); transform: translateY(-1px); }
.exam-card.is-past { opacity: 0.55; }
.exam-card.is-imminent { border-left-width: 6px; box-shadow: 0 0 0 2px color-mix(in srgb, var(--ev-c, var(--accent)) 15%, transparent); }
.exam-date { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; background: color-mix(in srgb, var(--ev-c, var(--accent)) 14%, transparent); border-radius: 10px; padding: 8px 4px; }
.exam-date-month { font-size: 9.5px; font-weight: 700; letter-spacing: 0.1em; color: var(--ev-c, var(--accent)); }
.exam-date-day { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; margin: 1px 0; }
.exam-date-weekday { font-size: 10px; color: var(--ink-3); font-family: var(--font-mono); }
.exam-body { min-width: 0; display: flex; flex-direction: column; gap: 4px; }
.exam-subject { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.exam-code-chip { font-family: var(--font-mono); font-size: 10px; padding: 2px 7px; border-radius: 999px; background: var(--paper-2); color: var(--ink-3); border: 1px solid var(--line); }
.exam-meta { font-size: 12px; color: var(--ink-3); font-family: var(--font-mono); display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
.exam-meta-item { display: inline-flex; align-items: center; gap: 4px; }
.exam-meta-item svg { width: 11px; height: 11px; }
.exam-note { font-size: 12px; color: var(--ink-2); line-height: 1.45; margin-top: 4px; }
.exam-right { display: flex; flex-direction: column; align-items: flex-end; justify-content: space-between; gap: 6px; min-width: 0; }
.exam-countdown { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 999px; background: var(--paper-2); border: 1px solid var(--line); font-size: 11px; font-weight: 600; white-space: nowrap; }
.exam-countdown.urgent { background: color-mix(in srgb, var(--accent) 14%, transparent); color: var(--accent); border-color: color-mix(in srgb, var(--accent) 30%, var(--line)); }
.exam-countdown.imminent { background: var(--accent); color: white; border-color: var(--accent); animation: pulse 1.6s ease-in-out infinite; }
.exam-people { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--ink-3); }
.exam-people svg { width: 12px; height: 12px; }
.exam-delete { width: 28px; height: 28px; border-radius: 8px; display: grid; place-items: center; color: var(--ink-3); opacity: 0; transition: opacity 0.15s ease; }
.exam-card:hover .exam-delete { opacity: 1; }
.exam-delete:hover { color: var(--accent); background: color-mix(in srgb, var(--accent) 12%, transparent); }
.exam-delete svg { width: 14px; height: 14px; }

.exams-empty { padding: 60px 20px; text-align: center; color: var(--ink-3); font-size: 14px; display: flex; flex-direction: column; align-items: center; gap: 10px; background: var(--paper); border: 1px dashed var(--line-2); border-radius: var(--radius-lg); }
.exams-empty svg { width: 32px; height: 32px; opacity: 0.5; }
.exams-empty .tb-btn { margin-top: 8px; }

/* Description block inside BlockDetail */
.detail-description { margin-top: 18px; padding: 12px 14px; background: var(--paper-2); border-left: 3px solid var(--bl-ink, var(--ink)); border-radius: 8px; font-size: 13px; color: var(--ink-2); line-height: 1.55; white-space: pre-wrap; }
.detail-description-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-3); margin-bottom: 4px; }

/* Description textarea in EntryEditor */
.ep-detail-field textarea.field-input { resize: vertical; min-height: 64px; font-family: var(--font-sans); padding: 8px 10px; font-size: 12px; line-height: 1.45; }

  if (!t && t !== 0) return 0;

  const m = s.match(/^(\d{1,2})[.:]?(\d{2})?$/);
  if (!m) return 0;
  const h = parseInt(m[1], 10);
  const mm = m[2] ? parseInt(m[2], 10) : 0;
  return h * 60 + mm;
}

  const h = Math.floor(mins / 60);

}

  const h = Math.floor(mins / 60);

// Inline <img> style that reproduces a GIF avatar's stored crop (object-position +
// extra zoom past cover). Returns undefined when no crop is stored, leaving the
// default object-fit:cover behaviour untouched for normal PNG avatars.
function avatarImgStyle(user) {
  if (!user) return undefined;
  const pos = user.avatar_pos, zoom = user.avatar_zoom;
  if (!pos && !(zoom > 1.001)) return undefined;
  const s = {};
  if (pos) s.objectPosition = pos;
  if (zoom > 1.001) { s.transform = `scale(${zoom})`; s.transformOrigin = pos || '50% 50%'; }
  return s;
}

function PersonAvatar({ user, name, className = 'avatar', style, title }) {

function useTweaks(defaults) {
  const [values, setValues] = React.useState(() => {
    try {
      const stored = JSON.parse(localStorage.getItem(TWEAKS_LS_KEY) || '{}');
      return { ...defaults, ...stored };
    } catch(e) { return { ...defaults }; }
  });
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => {
      const next = { ...prev, ...edits };
      try { localStorage.setItem(TWEAKS_LS_KEY, JSON.stringify(next)); } catch(e) {}
      return next;
    });
  }, []);
  return { ...values, setTweak };
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    const onOpen = () => setOpen(true);
    window.addEventListener('twk-open', onOpen);
    return () => window.removeEventListener('twk-open', onOpen);
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  const dismiss = () => setOpen(false);

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) };
      clampToViewport();
    };
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks" onMouseDown={(e) => e.stopPropagation()} onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}

}
function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;
  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" className="twk-seg">
        <div className="twk-seg-thumb" style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`, width: `calc((100% - 4px) / ${n})` }} />

        ))}
      </div>
    </TweakRow>
  );
}

function WeekGrid({ person, entries, query, onBlockClick, onMoveEntry, density }) {
  const HOUR = density === 'compact' ? 46 : 60;
  const DAY_START = 8 * 60;
  const DAY_END   = 19 * 60;
  const hours = [];
  for (let h = DAY_START; h <= DAY_END; h += 60) hours.push(h);
  const total = DAY_END - DAY_START;
  const today = todayIdx();
  const [draggingId, setDraggingId] = React.useState(null);
  const [dropHint, setDropHint] = React.useState(null);
  const [nowState, setNowState] = React.useState(nowMins());
  React.useEffect(() => {
    const id = setInterval(() => setNowState(nowMins()), 30 * 1000);
    return () => clearInterval(id);
  }, []);
  const byDay = [[], [], [], [], []];
  (entries || []).forEach((e, i) => {
    if (!e.day || e.day < 1 || e.day > 5) return;
    byDay[e.day - 1].push({ ...e, _i: i });
  });
  const mkPos = (e) => {
    const s = parseTime(e.start);
    const en = parseTime(e.end);
    const top = ((s - DAY_START) / 60) * HOUR;
    const h = ((en - s) / 60) * HOUR;
    return { top, h };
  };
  const nowTop = ((nowState - DAY_START) / 60) * HOUR;
  const nowVisible = today >= 0 && nowState >= DAY_START && nowState <= DAY_END;
  const handleDragOver = (e, dayIdx) => {
    e.preventDefault();
    const rect = e.currentTarget.getBoundingClientRect();
    const y = e.clientY - rect.top;
    const mins = DAY_START + Math.round((y / HOUR) * 2) * 30;
    setDropHint({ day: dayIdx + 1, mins });
  };
  const handleDrop = (e, dayIdx) => {
    e.preventDefault();
    const id = parseInt(e.dataTransfer.getData('text/plain'), 10);
    if (Number.isNaN(id) || !dropHint) return;
    onMoveEntry?.(id, dropHint.day, dropHint.mins);
    setDraggingId(null);
    setDropHint(null);
  };
  return (
    <div className={`wk ${draggingId != null ? 'is-dragging' : ''}`} style={{ '--hour': `${HOUR}px` }}>
      <div className="wk-cell wk-corner" />
      {DAY_NAMES.map((d, i) => {
        const date = new Date();
        const diff = i - (date.getDay() === 0 ? -1 : date.getDay() - 1);
        const dayDate = new Date(date); dayDate.setDate(date.getDate() + diff);
        return (
          <div key={d} className={`wk-cell wk-header ${today === i ? 'is-today' : ''}`}>
            <div className="day-name">{DAY_FULL[i]}</div>
            <div className="day-num">{dayDate.getDate()}</div>
          </div>
        );
      })}
      <div className="wk-cell" style={{ position: 'relative', minHeight: total / 60 * HOUR }}>
        {hours.map(h => (
          <div key={h} className="wk-time-label" style={{ position: 'absolute', right: 0, left: 0, top: ((h - DAY_START) / 60) * HOUR - 8 }}>
            {fmtTime(h)}
          </div>
        ))}
      </div>
      {DAY_NAMES.map((_, dayIdx) => (
        <div key={dayIdx} className="wk-cell wk-grid" style={{ minHeight: total / 60 * HOUR, position: 'relative' }}
             onDragOver={(e) => handleDragOver(e, dayIdx)}
             onDragLeave={() => setDropHint(null)}
             onDrop={(e) => handleDrop(e, dayIdx)}>
          {byDay[dayIdx].map((e) => {
            const pos = mkPos(e);
            const hidden = !matchesQuery(e, query);
            const micro = pos.h < 32;
            const short = pos.h < 64;
            return (
              <div key={e._i}
                   className={['wk-block', e.break ? 'is-break' : '', e.online ? 'is-online' : '', hidden ? 'dim' : '', draggingId === e._i ? 'dragging' : '', micro ? 'micro' : short ? 'short' : ''].join(' ')}
                   style={{ ...blockStyle(person, e), top: pos.top, height: pos.h - 2 }}
                   draggable={!e.break}
                   onDragStart={(ev) => { ev.dataTransfer.setData('text/plain', String(e._i)); ev.dataTransfer.effectAllowed = 'move'; setDraggingId(e._i); }}
                   onDragEnd={() => { setDraggingId(null); setDropHint(null); }}
                   onClick={() => onBlockClick?.(e._i)}
                   title={`${e.name || ''} · ${e.start}–${e.end}${e.classroom ? ' · ' + e.classroom : ''}`}>
                {e.code_name && !micro && <div className="bl-code">{e.code_name}</div>}
                <div className="bl-name">{e.name || (e.break ? 'Break' : 'Untitled')}</div>
                {!short && (
                  <div className="bl-meta mono">
                    <span>{e.start}–{e.end}</span>
                    {e.classroom && <><span className="dot" /><span style={{ whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{e.classroom}</span></>}
                    {e.online && <span className="bl-tag"><Icon name="online" /> Online</span>}
                  </div>
                )}
                {short && !micro && e.classroom && (
                  <div className="bl-meta mono" style={{ marginTop: 1 }}>
                    <span style={{ whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{e.classroom}</span>
                    {e.online && <span className="bl-tag"><Icon name="online" /></span>}
                  </div>
                )}
              </div>
            );
          })}
          {dropHint && dropHint.day === dayIdx + 1 && (
            <div className="drop-indicator" style={{ top: ((dropHint.mins - DAY_START) / 60) * HOUR }} />
          )}
          {today === dayIdx && nowVisible && (
            <div className="now-line" style={{ top: nowTop }}>
              <span className="now-label mono">{fmtTime(nowState)}</span>
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

function DayList({ person, entries, query, onBlockClick }) {
  const today = todayIdx();
  const byDay = [[], [], [], [], []];
  (entries || []).forEach((e, i) => {
    if (e.day >= 1 && e.day <= 5) byDay[e.day - 1].push({ ...e, _i: i });
  });
  byDay.forEach(arr => arr.sort((a, b) => parseTime(a.start) - parseTime(b.start)));
  const nowState = nowMins();
  return (
    <div className="dl">
      {DAY_NAMES.map((d, i) => {
        const rows = byDay[i];
        const dayMins = rows.filter(r => !r.break).reduce((acc, r) => acc + (parseTime(r.end) - parseTime(r.start)), 0);
        return (
          <div key={d} className={`dl-day ${today === i ? 'is-today' : ''}`}>
            <div className="dl-day-head">
              <div className="dl-day-name">{DAY_FULL[i]}{today === i && <span className="today-pill">Today</span>}</div>
              <div className="dl-day-meta mono">{rows.filter(r => !r.break).length} classes · {(dayMins / 60).toFixed(1)}h</div>
            </div>
            <div className="dl-rows">
              {!rows.length && <div className="dl-empty">Free day — go touch grass 🌿</div>}
              {rows.map(e => {
                const s = parseTime(e.start), en = parseTime(e.end);
                const isNow = today === i && nowState >= s && nowState < en;
                const dim = !matchesQuery(e, query);
                return (
                  <div key={e._i} className={`dl-row ${e.break ? 'is-break' : ''} ${isNow ? 'is-now' : ''}`}
                       onClick={() => onBlockClick?.(e._i)} style={{ opacity: dim ? 0.3 : 1 }}>
                    <div className="dl-row-time"><span>{e.start}</span><span className="end">{e.end}</span></div>
                    <div className="dl-row-block" style={blockStyle(person, e)}>
                      {e.code_name && <div className="bl-code">{e.code_name}</div>}
                      <div className="bl-name">{e.name || (e.break ? 'Break' : 'Untitled')}</div>
                      <div className="bl-meta mono">
                        {e.classroom && <><Icon name="pin" style={{ width: 11, height: 11 }} /> {e.classroom}</>}
                        {e.online && <span className="bl-tag"><Icon name="online" /> Online</span>}
                        {isNow && <span className="bl-tag" style={{ background: 'var(--accent)', color: 'white' }}>● Live now</span>}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function Bento({ person, entries, query, events, users, personName, now, onBlockClick }) {
  const today = todayIdx();
  const n = now != null ? now : nowMins();
  const sortedToday = (entries || [])
    .filter(e => e.day === today + 1)
    .map((e) => ({ ...e, _i: (entries || []).indexOf(e) }))
    .sort((a, b) => parseTime(a.start) - parseTime(b.start));
  const current = sortedToday.find(e => { const s = parseTime(e.start), en = parseTime(e.end); return n >= s && n < en; });
  const upcoming = sortedToday.filter(e => parseTime(e.start) > n);
  const next = upcoming[0];
  const classes = (entries || []).filter(e => !e.break);
  const totalHours = classes.reduce((acc, e) => acc + (parseTime(e.end) - parseTime(e.start)), 0) / 60;
  const onlineCount = classes.filter(e => e.online).length;
  const uniqueRooms = new Set(classes.map(e => e.classroom).filter(Boolean)).size;
  const uniqueSubjects = new Set(classes.map(e => e.code_name).filter(Boolean)).size;
  const perDay = [0, 0, 0, 0, 0];
  classes.forEach(e => { if (e.day >= 1 && e.day <= 5) perDay[e.day - 1] += (parseTime(e.end) - parseTime(e.start)) / 60; });
  const maxH = Math.max(...perDay, 1);
  const progress = current ? ((n - parseTime(current.start)) / (parseTime(current.end) - parseTime(current.start))) * 100 : 0;
  return (
    <div className="bento">
      <div className="bento-row">
        <div className="bento-card bento-now">
          <div className="bento-card-title"><Icon name="play" /> Right now</div>
          {current ? (
            <div className="bn-now-block" style={blockStyle(person, current)} onClick={() => onBlockClick?.(current._i)}>
              <div className="code mono">{current.code_name}</div>
              <div className="name">{current.name || 'Break'}</div>
              <div className="row mono">
                <span>{current.start}–{current.end}</span>
                {current.classroom && <span>· {current.classroom}</span>}
                {current.online && <span>· Online</span>}
              </div>
              <div className="bn-progress"><i style={{ width: progress + '%' }} /></div>
              <div className="bn-progress-meta"><span>{fmtTime(n)} now</span><span>{Math.max(0, parseTime(current.end) - n)} min left</span></div>
            </div>
          ) : (
            <>
              <div className="bn-big">{today < 0 ? 'Weekend' : 'Nothing right now'}</div>
              <div className="bn-sub">{today < 0 ? 'Enjoy the rest. 🌅' : next ? `Up next at ${next.start}` : 'No more classes today.'}</div>
            </>
          )}
        </div>
        <div className="bento-col">
          <div className="bento-card bento-next">
            <div className="bento-card-title"><Icon name="clock" /> Up next today</div>
            {upcoming.length ? (
              <div className="bn-list">
                {upcoming.slice(0, 4).map(e => (
                  <div key={e._i} className="bn-list-item" onClick={() => onBlockClick?.(e._i)}>
                    <div className="swatch" style={{ background: person?.colour }} />
                    <div className="body">
                      <div className="nm">{e.name || 'Break'}</div>
                      <div className="mt">{e.start}–{e.end}{e.classroom ? ` · ${e.classroom}` : ''}</div>
                    </div>
                    {e.online && <span className="bl-tag" style={{ background: 'var(--paper-3)', color: 'var(--ink-3)' }}><Icon name="online" /></span>}
                  </div>
                ))}
              </div>
            ) : (
              <div style={{ marginTop: 12, color: 'var(--ink-3)', fontSize: 13 }}>{today < 0 ? 'See you Monday.' : 'No more classes today 🎉'}</div>
            )}
          </div>
          <div className="bento-card bento-stats">
            <div className="bento-card-title"><Icon name="chart" /> Week at a glance</div>
            <div className="bn-stats-grid">
              <div className="bn-stat"><div className="num">{totalHours.toFixed(1)}<span style={{ fontSize: 13, color: 'var(--ink-3)', fontWeight: 500 }}> h</span></div><div className="lbl">Contact hours</div></div>
              <div className="bn-stat"><div className="num">{uniqueSubjects}</div><div className="lbl">Subjects</div></div>
              <div className="bn-stat"><div className="num">{uniqueRooms}</div><div className="lbl">Rooms</div></div>
              <div className="bn-stat"><div className="num">{onlineCount}</div><div className="lbl">Online</div></div>
            </div>
          </div>
        </div>
      </div>
      <div className="bento-row">
        <div className="bento-card bento-today">
          <div className="bento-card-title"><Icon name="calendar" /> {today < 0 ? 'Monday plan' : "Today's full plan"}</div>
          <div className="bn-list" style={{ overflow: 'auto', maxHeight: 320 }}>
            {(today < 0 ? (entries || []).filter(e => e.day === 1) : sortedToday).map((e, idx) => {
              const isNow = current && current._i === e._i;
              return (
                <div key={idx} className="bn-list-item" onClick={() => onBlockClick?.(e._i)} style={isNow ? { background: 'var(--accent-soft)' } : {}}>
                  <div className="swatch" style={{ background: e.break ? 'var(--ink-4)' : person?.colour }} />
                  <div className="body">
                    <div className="nm">{e.name || 'Break'}</div>
                    <div className="mt">{e.start}–{e.end}{e.classroom ? ` · ${e.classroom}` : ''}</div>
                  </div>
                  {isNow && <span className="bl-tag" style={{ background: 'var(--accent)', color: 'white' }}>Now</span>}
                </div>
              );
            })}
            {!sortedToday.length && today >= 0 && <div style={{ color: 'var(--ink-3)', fontSize: 13 }}>Free day. 🌿</div>}
          </div>
        </div>
        <div className="bento-card bento-week">
          <div className="bento-card-title"><Icon name="chart" /> Hours by day</div>
          <div className="bn-bars" style={{ marginTop: 18 }}>
            {perDay.map((h, i) => (
              <div key={i} className={`bn-bar ${today === i ? 'is-today' : ''}`}>
                <div className="bn-bar-track">
                  <div className="bn-bar-fill" data-h={h.toFixed(1) + 'h'} style={{
                    height: `${maxH > 0 ? (h / maxH) * 100 : 0}%`,
                    minHeight: h > 0 ? 4 : 0,
                    background: today === i ? person?.colour : person?.background_colour,
                    opacity: h === 0 ? 0.3 : 1,
                  }} />
                </div>
                <div className="bn-bar-label">{DAY_NAMES[i]}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
      <div className="bento-card bento-events">
        <div className="bento-card-title"><Icon name="clipboard" /> Upcoming exams</div>
        {(() => {
          const mine = (events || []).filter(ev => ev.type === 'exam' && (ev.interested || []).includes(personName));
          return mine.length ? (
            <div className="bn-list">
              {mine.sort((a,b)=>(a.date||'').localeCompare(b.date||'')).slice(0, 4).map((ev, i) => (
                <div key={i} className="bn-list-item">
                  <div className="swatch" style={{ background: examColour(ev, users) }} />
                  <div className="body">
                    <div className="nm">{ev.title}</div>
                    <div className="mt">{ev.date ? new Date(ev.date + 'T00:00:00').toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' }) : '—'}{ev.time ? ` · ${ev.time}` : ''}</div>
                  </div>
                </div>
              ))}
            </div>
          ) : (
            <div style={{ marginTop: 12, color: 'var(--ink-3)', fontSize: 13 }}>No exams yet. Open <strong>Exams</strong> to add one.</div>
          );
        })()}
      </div>
    </div>
  );
}

function CompareView({ people, query, density }) {
  const HOUR = density === 'compact' ? 46 : 60;
  const DAY_START = 8 * 60;
  const DAY_END   = 19 * 60;
  const hours = [];
  for (let h = DAY_START; h <= DAY_END; h += 60) hours.push(h);
  const total = DAY_END - DAY_START;
  const today = todayIdx();
  const [nowState, setNowState] = React.useState(nowMins());
  React.useEffect(() => {
    const id = setInterval(() => setNowState(nowMins()), 30 * 1000);
    return () => clearInterval(id);
  }, []);
  const N = people.length;
  const ROW = HOUR;
  const HBR = ROW * N;
  const totalH = (total / 60) * HBR;
  const nowHourIdx = Math.floor((nowState - DAY_START) / 60);
  const nowOffsetInHour = ((nowState - DAY_START) % 60) / 60 * ROW;
  const nowTop = nowHourIdx * HBR + nowOffsetInHour;
  const nowVisible = today >= 0 && nowState >= DAY_START && nowState <= DAY_END;
  const segmentEntry = (e, pi) => {
    const sMin = parseTime(e.start);
    const eMin = parseTime(e.end);
    const segs = [];
    let cur = sMin;
    while (cur < eMin) {
      const hourIdx = Math.floor((cur - DAY_START) / 60);
      const hourBoundary = DAY_START + (hourIdx + 1) * 60;
      const segEnd = Math.min(eMin, hourBoundary);
      const offsetInHour = ((cur - DAY_START) - hourIdx * 60) / 60 * ROW;
      const top = hourIdx * HBR + pi * ROW + offsetInHour;
      const height = ((segEnd - cur) / 60) * ROW;
      segs.push({ top, height, isFirst: cur === sMin, isLast: segEnd === eMin });
      cur = segEnd;
    }
    return segs;
  };
  return (
    <div className="wk cmp" style={{ '--hour': `${HBR}px`, '--row': `${ROW}px` }}>
      <div className="wk-cell wk-corner" />
      {DAY_NAMES.map((d, i) => {
        const date = new Date();
        const diff = i - (date.getDay() === 0 ? -1 : date.getDay() - 1);
        const dayDate = new Date(date); dayDate.setDate(date.getDate() + diff);
        return (
          <div key={d} className={`wk-cell wk-header ${today === i ? 'is-today' : ''}`}>
            <div className="day-name">{DAY_FULL[i]}</div>
            <div className="day-num">{dayDate.getDate()}</div>
            <div className="cmp-headers">
              {people.map(([name, p]) => (
                <PersonAvatar key={name} user={p} name={name} className="cmp-head-chip" title={name} style={{ background: p.background_colour, color: p.colour }} />
              ))}
            </div>
          </div>
        );
      })}
      <div className="wk-cell cmp-time-col" style={{ position: 'relative', minHeight: totalH, padding: 0 }}>
        {hours.map(h => {
          const hi = Math.floor((h - DAY_START) / 60);
          return (
            <div key={h} className="wk-time-label cmp-hour-label" style={{ position: 'absolute', right: 0, left: 0, top: hi * HBR - 8 }}>{fmtTime(h)}</div>
          );
        })}
      </div>
      {DAY_NAMES.map((_, dayIdx) => (
        <div key={dayIdx} className="wk-cell wk-grid cmp-grid" style={{ minHeight: totalH, position: 'relative', padding: 0 }}>
          {hours.slice(0, -1).flatMap((h, hi) =>
            people.slice(1).map((_, sub) => (
              <div key={`d-${hi}-${sub}`} className="cmp-sub-divider" style={{ position: 'absolute', left: 0, right: 0, top: hi * HBR + (sub + 1) * ROW, height: 1 }} />
            ))
          )}
          {people.map(([name, p], pi) => {
            const entries = (p.timetable || []).filter(e => e.day === dayIdx + 1);
            return entries.flatMap((e, ei) =>
              segmentEntry(e, pi).map((seg, si) => {
                const micro = seg.height < 32;
                const short = seg.height < 64;
                const hidden = !matchesQuery(e, query);
                return (
                  <div key={pi + ':' + ei + ':' + si}
                       className={['wk-block cmp-block', e.break ? 'is-break' : '', e.online ? 'is-online' : '', hidden ? 'dim' : '', micro ? 'micro' : short ? 'short' : ''].join(' ')}
                       style={{ '--bl-bg': p.background_colour, '--bl-ink': p.colour, top: seg.top + 1, height: seg.height - 2, left: 4, right: 4, position: 'absolute' }}
                       title={`${name} · ${e.name || ''} · ${e.start}–${e.end}${e.classroom ? ' · ' + e.classroom : ''}`}>
                    {!micro && (
                      <div className="bl-code cmp-owner-line">
                        <span className="cmp-owner-name">{name}</span>
                        {e.code_name && <><span className="cmp-owner-sep"> · </span>{e.code_name}</>}
                      </div>
                    )}
                    <div className="bl-name">{e.name || (e.break ? 'Break' : 'Untitled')}</div>
                    {!short && e.classroom && (
                      <div className="bl-meta mono">
                        <span style={{ whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{e.classroom}</span>
                        {e.online && <span className="bl-tag"><Icon name="online" /></span>}
                      </div>
                    )}
                  </div>
                );
              })
            );
          })}
          {today === dayIdx && nowVisible && (
            <div className="now-line" style={{ top: nowTop }}>
              <span className="now-label mono">{fmtTime(nowState)}</span>
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

// ─────────────────────────────────────────────
// ExamsList: chronological countdown for type:'exam' events
// ─────────────────────────────────────────────
function daysBetween(dateStr) {
  if (!dateStr) return Infinity;
  const d = new Date(dateStr + 'T00:00:00');
  if (isNaN(d)) return Infinity;
  const t0 = new Date(); t0.setHours(0, 0, 0, 0);
  return Math.round((d - t0) / 86400000);
}
function countdownLabel(days) {
  if (days === Infinity) return 'No date';
  if (days < 0) return `${Math.abs(days)} day${Math.abs(days) === 1 ? '' : 's'} ago`;
  if (days === 0) return 'Today';
  if (days === 1) return 'Tomorrow';
  if (days < 7)  return `In ${days} days`;
  if (days < 14) return `In ${days} days`;
  if (days < 30) return `In ${Math.round(days / 7)} weeks`;
  return `In ${Math.round(days / 30)} months`;
}

// Single source of truth for an exam's colour: a linked class code → that class
// owner's colour; otherwise the exam's own tag colour. Used by every view so the
// same exam never shows two different colours.
function examColour(ev, users) {
  if (ev && ev.subject_code) {
    for (const u in (users || {})) {
      if ((users[u].timetable || []).some(e => e.code_name === ev.subject_code)) return users[u].colour;
    }
  }
  return (ev && ev.colour) || 'var(--accent)';
}

function ExamMatchesQuery(ev, q) {
  if (!q) return true;
  const s = q.toLowerCase();
  return (
    (ev.title || '').toLowerCase().includes(s) ||
    (ev.room || '').toLowerCase().includes(s) ||
    (ev.subject_code || '').toLowerCase().includes(s) ||
    (ev.note || '').toLowerCase().includes(s) ||
    (ev.interested || []).some(n => (n || '').toLowerCase().includes(s))
  );
}

function ExamsList({ events, users, query, selectedNames, onOpenAdd, onEdit, onDelete }) {
  const names = (selectedNames && selectedNames.length) ? selectedNames : [];
  const all = (events || []).filter(ev =>
    ev.type === 'exam' &&
    (ev.interested || []).some(n => names.includes(n)) &&
    ExamMatchesQuery(ev, query));
  const sorted = [...all].sort((a, b) => (a.date || '').localeCompare(b.date || ''));
  // Bucket by days until
  const upcoming = sorted.filter(ev => daysBetween(ev.date) >= 0);
  const past = sorted.filter(ev => daysBetween(ev.date) < 0);
  const thisWeek = upcoming.filter(ev => { const d = daysBetween(ev.date); return d <= 7; });
  const nextWeek = upcoming.filter(ev => { const d = daysBetween(ev.date); return d > 7 && d <= 14; });
  const later    = upcoming.filter(ev => { const d = daysBetween(ev.date); return d > 14 || d === Infinity; });

  const nextExam = upcoming[0];
  const nextDays = nextExam ? daysBetween(nextExam.date) : null;

  // Resolve colour via the shared helper so it matches Bento / EventCard exactly.
  const colourFor = (ev) => examColour(ev, users);

  if (!sorted.length) {
    return (
      <div className="exams">
        <div className="exams-empty">
          <Icon name="clipboard" />
          <div>No exams scheduled.</div>
          <button className="tb-btn primary" onClick={onOpenAdd}><Icon name="plus" /> Add an exam</button>
        </div>
      </div>

  return (
    <div className="exams">

        <div className="exams-hero">

            <div className="exams-hero-meta">
              {nextExam.date ? new Date(nextExam.date + 'T00:00:00').toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' }) : 'No date'}
              {nextExam.time && <> · {nextExam.time}{nextExam.end_time ? `–${nextExam.end_time}` : ''}</>}
              {nextExam.room && <> · {nextExam.room}</>}
              {' · '}<strong>{countdownLabel(nextDays)}</strong>
            </div>
          </div>
        </div>
      )}

      {[
        { name: 'This week', list: thisWeek },
        { name: 'Next week', list: nextWeek },
        { name: 'Later',     list: later },
        { name: 'Past',      list: past },

              <div key={i} className={`exam-card ${isPast ? 'is-past' : ''} ${isImminent ? 'is-imminent' : ''}`} style={{ '--ev-c': c, cursor: onEdit ? 'pointer' : 'default' }}

                  <div className="exam-date-month">{monthShort.toUpperCase()}</div>
                  <div className="exam-date-day">{dayN}</div>
                  <div className="exam-date-weekday">{weekday}</div>
                </div>
                <div className="exam-body">
                  <div className="exam-subject">
                    {ev.title || 'Untitled exam'}
                    {ev.subject_code && <span className="exam-code-chip mono">{ev.subject_code}</span>}
                  </div>
                  <div className="exam-meta">
                    {dt && <span className="exam-meta-item"><Icon name="calendar" /> {dt.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' })}</span>}
                    {ev.time && <span className="exam-meta-item"><Icon name="clock" /> {ev.time}{ev.end_time ? `–${ev.end_time}` : ''}</span>}
                    {ev.room && <span className="exam-meta-item"><Icon name="pin" /> {ev.room}</span>}
                  </div>
                  {ev.note && <div className="exam-note">{ev.note}</div>}
                </div>
                <div className="exam-right">
                  <span className={`exam-countdown ${isImminent ? 'imminent' : isUrgent ? 'urgent' : ''}`}>
                    {countdownLabel(days)}
                  </span>
                  {(ev.interested || []).length > 0 && (
                    <span className="exam-people"><Icon name="users" /> {ev.interested.length}</span>
                  )}
                  <button className="exam-delete" onClick={(e) => { e.stopPropagation(); onDelete(i); }} aria-label="Delete exam"><Icon name="trash" /></button>
                </div>
              </div>
            );
          })}
        </div>
      ))}
    </div>
  );
}

function Modal({ title, onClose, children, wide, footer }) {
  React.useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onClose?.(); };
    window.addEventListener('keydown', onKey);
    document.body.style.overflow = 'hidden';
    return () => { window.removeEventListener('keydown', onKey); document.body.style.overflow = ''; };
  }, [onClose]);
  return ReactDOM.createPortal(
    <div className="overlay" onClick={(e) => { if (e.target === e.currentTarget) onClose?.(); }}>
      <div className={`modal ${wide ? 'wide' : ''}`}>
        {title && (
          <div className="modal-head">
            <div className="modal-title">{title}</div>
            <button className="icon-btn" onClick={onClose} aria-label="Close"><Icon name="x" /></button>
          </div>
        )}
        <div className="modal-body">{children}</div>
        {footer && <div className="modal-foot">{footer}</div>}
      </div>
    </div>,
    document.body
  );
}

// Circular zoom/crop for profile pictures. Outputs a square PNG blob (the avatar
// is always displayed inside a circle, so a centered square crop is enough).
function AvatarCropper({ file, onCancel, onConfirm }) {
  const SIZE = 280;   // on-screen crop box (px)
  const OUT  = 512;   // exported image size (px)
  const canvasRef = React.useRef(null);
  const dragRef   = React.useRef(null);
  const [img, setImg]           = React.useState(null);
  const [scale, setScale]       = React.useState(1);
  const [minScale, setMinScale] = React.useState(1);
  const [offset, setOffset]     = React.useState({ x: 0, y: 0 }); // image top-left in box coords

  // Keep the image fully covering the circular box.
  const clamp = React.useCallback((o, sc, im) => {
    const w = im.width * sc, h = im.height * sc;
    return { x: Math.min(0, Math.max(SIZE - w, o.x)), y: Math.min(0, Math.max(SIZE - h, o.y)) };
  }, []);

  React.useEffect(() => {
    const url = URL.createObjectURL(file);
    const im = new Image();
    im.onload = () => {
      const cover = Math.max(SIZE / im.width, SIZE / im.height);
      setImg(im);
      setMinScale(cover);
      setScale(cover);
      setOffset({ x: (SIZE - im.width * cover) / 2, y: (SIZE - im.height * cover) / 2 });
    };
    im.src = url;
    return () => URL.revokeObjectURL(url);
  }, [file]);

  React.useEffect(() => {
    const c = canvasRef.current;
    if (!c || !img) return;
    const ctx = c.getContext('2d');
    ctx.clearRect(0, 0, SIZE, SIZE);
    ctx.drawImage(img, offset.x, offset.y, img.width * scale, img.height * scale);
  }, [img, scale, offset]);

  const onZoom = (v) => {
    if (!img) return;
    const sc = parseFloat(v);
    const cx = SIZE / 2, cy = SIZE / 2;
    const ratio = sc / scale;
    const nx = cx - (cx - offset.x) * ratio;
    const ny = cy - (cy - offset.y) * ratio;
    setScale(sc);
    setOffset(clamp({ x: nx, y: ny }, sc, img));
  };

  const start = (pt) => { dragRef.current = { sx: pt.clientX, sy: pt.clientY, ox: offset.x, oy: offset.y }; };
  const move  = (pt) => {
    if (!dragRef.current || !img) return;
    const nx = dragRef.current.ox + (pt.clientX - dragRef.current.sx);
    const ny = dragRef.current.oy + (pt.clientY - dragRef.current.sy);
    setOffset(clamp({ x: nx, y: ny }, scale, img));
  };
  const end = () => { dragRef.current = null; };

  const confirm = () => {
    if (!img) return;
    // GIFs: re-encoding through a canvas freezes them to one frame. Instead upload the
    // ORIGINAL animated file and express the crop as CSS (object-position + extra zoom)
    // so the animation survives. Visible window in natural px: top-left = -offset/scale,
    // side = SIZE/scale. Map that to object-position % + a zoom factor past "cover".
    if (file && file.type === 'image/gif') {
      const winN = SIZE / scale;
      const vx = -offset.x / scale, vy = -offset.y / scale;
      const posX = img.width  > winN ? Math.max(0, Math.min(100, (vx / (img.width  - winN)) * 100)) : 50;
      const posY = img.height > winN ? Math.max(0, Math.min(100, (vy / (img.height - winN)) * 100)) : 50;
      const zoom = minScale ? scale / minScale : 1;
      onConfirm(file, { ext: 'gif', pos: `${posX.toFixed(1)}% ${posY.toFixed(1)}%`, zoom: +zoom.toFixed(3) });
      return;
    }
    const out = document.createElement('canvas');
    out.width = OUT; out.height = OUT;
    const ctx = out.getContext('2d');
    const k = OUT / SIZE;
    ctx.drawImage(img, offset.x * k, offset.y * k, img.width * scale * k, img.height * scale * k);
    out.toBlob((blob) => { if (blob) onConfirm(blob, { ext: 'png' }); }, 'image/png');
  };

  return (
    <Modal title={<><Icon name="image" /> Adjust photo</>} onClose={onCancel}
      footer={
        <>
          <button className="tb-btn" onClick={onCancel}>Cancel</button>
          <button className="tb-btn primary" style={{ marginLeft: 'auto' }} onClick={confirm} disabled={!img}>Use photo</button>
        </>
      }
    >
      <div className="avatar-cropper">
        <div className="avatar-cropper-stage" style={{ width: SIZE, height: SIZE }}
          onMouseDown={(e) => start(e)} onMouseMove={(e) => move(e)} onMouseUp={end} onMouseLeave={end}
          onTouchStart={(e) => start(e.touches[0])}
          onTouchMove={(e) => { e.preventDefault(); move(e.touches[0]); }}
          onTouchEnd={end}>
          <canvas ref={canvasRef} width={SIZE} height={SIZE} />
          <div className="avatar-cropper-mask" />
        </div>
        <div className="avatar-cropper-zoom">
          <Icon name="search" />
          <input type="range" min={minScale} max={minScale * 4} step="0.001" value={scale} onChange={(e) => onZoom(e.target.value)} />
        </div>
        <div className="avatar-cropper-hint">Drag to reposition · slide to zoom</div>
      </div>
    </Modal>
  );
}

function EditPerson({ mode, originalName, person, allUsernames, serverConfig, onClose, onSave, onDelete, onSwitchPerson }) {
  const [name, setName] = React.useState(originalName || '');
  const [code, setCode] = React.useState(person?.code || '');
  const [fg, setFg]     = React.useState(person?.colour || '#0C447C');
  const [bg, setBg]     = React.useState(person?.background_colour || '#E6F1FB');
  const [fontUrl, setFontUrl]   = React.useState(person?.font_url || '');
  const [fontSize, setFontSize] = React.useState(person?.font_size || 14);
  const [avatarUrl, setAvatarUrl] = React.useState(person?.avatar_url || '');
  const [avatarPos, setAvatarPos]   = React.useState(person?.avatar_pos || '');   // CSS object-position (GIF crop)
  const [avatarZoom, setAvatarZoom] = React.useState(person?.avatar_zoom || null); // extra zoom past cover (GIF crop)
  const [avatarStatus, setAvatarStatus] = React.useState({ kind: null, msg: '' });
  const [uploading, setUploading] = React.useState(false);
  const [cropFile, setCropFile] = React.useState(null);
  const [entries, setEntries]   = React.useState(person?.timetable || []);
  const [err, setErr]   = React.useState('');
  const fileInputRef = React.useRef(null);

  const uploadAvatar = async (blob, ext = 'png') => {
    if (!blob) return;
    const trimmedName = name.trim();
    if (!trimmedName) { setAvatarStatus({ kind: 'err', msg: 'Set a display name first.' }); return; }
    const baseUrl = serverConfig?.url || window.location.origin;
    if (blob.size > 2 * 1024 * 1024) {
      setAvatarStatus({ kind: 'err', msg: ext === 'gif' ? 'GIF too large (max 2 MB).' : 'Cropped image too large (max 2 MB).' }); return;
    }
    setUploading(true);
    setAvatarStatus({ kind: null, msg: 'Uploading…' });
    try {
      const fd = new FormData();
      fd.append('username', trimmedName);
      fd.append('file', blob, 'avatar.' + ext);  // extension drives server-side type (gif kept animated)
      const headers = {};
      if (serverConfig?.token) headers['X-Save-Token'] = serverConfig.token;  // optional
      const res = await fetch(baseUrl + '/upload-avatar', {
        method: 'POST',
        headers,
        body: fd,
      });
      if (!res.ok) {
        const txt = await res.text().catch(() => '');
        throw new Error(txt || `HTTP ${res.status}`);
      }
      const json = await res.json();
      const url = json.url + '?v=' + Date.now();
      setAvatarUrl(url);
      setAvatarStatus({ kind: 'ok', msg: '✓ Uploaded — Save Changes to apply.' });
    } catch (e) {
      setAvatarStatus({ kind: 'err', msg: '✗ ' + (e.message || 'Upload failed') });
    }
    setUploading(false);
  };
  const clearAvatar = () => {
    setAvatarUrl(''); setAvatarPos(''); setAvatarZoom(null);
    setAvatarStatus({ kind: null, msg: 'Removed — Save Changes to apply.' });
  };
  // Called when the cropper confirms. meta.ext drives upload type; for GIFs meta also
  // carries the CSS crop (pos/zoom) so animation is preserved instead of canvas-flattened.
  const onCropConfirm = (blob, meta = {}) => {
    setCropFile(null);
    if (meta.ext === 'gif') { setAvatarPos(meta.pos || ''); setAvatarZoom(meta.zoom || null); }
    else { setAvatarPos(''); setAvatarZoom(null); }
    uploadAvatar(blob, meta.ext || 'png');
  };
  const update = (i, field, value) => {
    setEntries(prev => {
      const next = [...prev];
      if (field === 'break' || field === 'online') {
        if (value) next[i] = { ...next[i], [field]: true };
        else { const c = { ...next[i] }; delete c[field]; next[i] = c; }
      } else {
        next[i] = { ...next[i], [field]: value };
      }
      return next;
    });
  };
  const [editingIdx, setEditingIdx] = React.useState(null);
  const addToDay = (day) => {
    setEntries(prev => {
      const next = [...prev, { day, start: '9.00', end: '10.00', code_name: '', name: '', classroom: '' }];
      Promise.resolve().then(() => setEditingIdx(next.length - 1));
      return next;
    });
  };
  const delRow = (i) => {
    setEntries(prev => prev.filter((_, k) => k !== i));
    setEditingIdx(curr => (curr === i ? null : curr != null && curr > i ? curr - 1 : curr));
  };
  const submit = () => {
    const trimmed = name.trim();
    if (!trimmed) { setErr('Name is required'); return; }
    if (mode === 'add' && allUsernames.includes(trimmed)) { setErr('That name already exists'); return; }
    if (mode === 'edit' && trimmed !== originalName && allUsernames.includes(trimmed)) { setErr('That name already exists'); return; }
    const personOut = { colour: fg, background_colour: bg, code, timetable: entries };
    if (fontUrl) { personOut.font_url = fontUrl; personOut.font_size = fontSize; }
    if (avatarUrl) {
      personOut.avatar_url = avatarUrl;

  const entriesByDay = React.useMemo(() => {
    const groups = [[], [], [], [], []];
    entries.forEach((e, idx) => { if (e.day >= 1 && e.day <= 5) groups[e.day - 1].push({ ...e, _idx: idx }); });
    groups.forEach(g => g.sort((a, b) => parseTime(a.start) - parseTime(b.start)));

  }, [entries]);

          <div className="ep-preview" style={{ '--bl-bg': bg, '--bl-ink': fg }}>
            <div className={`ep-preview-avatar ${avatarUrl ? 'has-image' : ''}`}>
              {avatarUrl ? <img src={avatarUrl} alt={name || ''} draggable="false" style={avatarImgStyle({ avatar_pos: avatarPos, avatar_zoom: avatarZoom })} /> : initialsForPreview}
            </div>
            <div>
              <div className="ep-preview-name">{name || 'Untitled person'}</div>

            <div className="ep-preview-block">

          <div className="ep-field">

                {avatarUrl ? <img src={avatarUrl} alt="" draggable="false" style={avatarImgStyle({ avatar_pos: avatarPos, avatar_zoom: avatarZoom })} /> : initialsForPreview}
              </div>
              <div className="ep-avatar-actions">
                <div className="ep-avatar-buttons">
                  <input ref={fileInputRef} type="file" accept="image/png,image/jpeg,image/webp,image/gif" style={{ display: 'none' }}
                    onChange={(e) => { const f = e.target.files?.[0]; if (f) setCropFile(f); e.target.value = ''; }} />
                  <button type="button" className="ep-avatar-btn" onClick={() => fileInputRef.current?.click()} disabled={uploading}>
                    <Icon name="upload" style={{ width: 11, height: 11, display: 'inline', verticalAlign: 'middle', marginRight: 4 }} />
                    {avatarUrl ? 'Replace' : 'Upload'}

                  {avatarUrl && (

              </div>

          {cropFile && (
            <AvatarCropper file={cropFile}

          <div className="ep-field">
            <label className="ep-field-label">Display name</label>
            <input className="field-input" value={name} onChange={(e) => { setName(e.target.value); setErr(''); }} placeholder="e.g. Alex Chen" />
          </div>

            <input className="field-input" value={code} onChange={(e) => setCode(e.target.value)} placeholder="e.g. AI And Data" />
          </div>
          <div className="ep-field">
            <label className="ep-field-label">Colour</label>
            <ColorPicker fg={fg} bg={bg} onChange={(newFg, newBg) => { setFg(newFg); setBg(newBg); }} />
          </div>
          <FontField url={fontUrl} size={fontSize} name={name} fg={fg} bg={bg}
            onChange={(patch) => { if ('font_url' in patch) setFontUrl(patch.font_url); if ('font_size' in patch) setFontSize(patch.font_size); }} />
        </section>
        <section className="ep-card ep-entries">
          <header className="ep-entries-head">
            <div>
              <div className="ep-entries-title">Schedule</div>
              <div className="ep-entries-sub">{entries.length} {entries.length === 1 ? 'entry' : 'entries'} across the week</div>

          </header>
          <div className="ep-day-cols">
            {DAY_NAMES.map((d, di) => (
              <div key={d} className="ep-day-col">
                <div className="ep-day-col-head">

          </div>
          {editingIdx != null && entries[editingIdx] && (
            <EntryEditor entry={entries[editingIdx]} idx={editingIdx} fg={fg} bg={bg} onUpdate={update} onDelete={() => delRow(editingIdx)} onClose={() => setEditingIdx(null)} />

    </Modal>
  );
}
