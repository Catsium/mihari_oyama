// Free-text class-code field with inline ghost-text autocomplete. Type any prefix,
// press Tab (or →) to accept the first matching code; Enter accepts the ghost if any.
function CodeTypeahead({ value, onChange, options, onEnter, placeholder }) {
  const lower = (value || '').toLowerCase();
  const match = value ? options.find(o => o.toLowerCase().startsWith(lower) && o.length > value.length) : '';
  const ghost = match ? match.slice(value.length) : '';
  const accept = () => { if (match) onChange(match); };
  return (
    <div className="events-add-typeahead">
      <div className="events-add-ghost" aria-hidden="true">
        <span className="ta-typed">{value}</span><span className="ta-ghost">{ghost}</span>
      </div>
      <input className="events-add-link ta-input" value={value} placeholder={placeholder}
        onChange={(e) => onChange(e.target.value)}
        onKeyDown={(e) => {
          if ((e.key === 'Tab' || e.key === 'ArrowRight') && ghost) { e.preventDefault(); accept(); }
          else if (e.key === 'Enter') { e.preventDefault(); if (ghost) accept(); else onEnter && onEnter(); }
        }} />
      {ghost && <span className="ta-hint">⇥ Tab</span>}
    </div>
  );
}

function EventsModal({ events, usernames, users, defaultOwner, initialEditIdx, onClose, onAdd, onUpdate, onDelete, onAddInterest, onRemoveInterest }) {
  const [title, setTitle]   = React.useState('');
  const [date, setDate]     = React.useState('');
  const [time, setTime]     = React.useState('');
  const [endTime, setEndTime] = React.useState('');
  const [colour, setColour] = React.useState('#3b82f6');
  const [note, setNote]     = React.useState('');
  const [room, setRoom]     = React.useState('');
  const [subjectCode, setSubjectCode] = React.useState('');
  const [owner, setOwner]   = React.useState(defaultOwner || (usernames && usernames[0]) || '');
  const [editIdx, setEditIdx] = React.useState(initialEditIdx != null ? initialEditIdx : null);

  const resetForm = () => {
    setTitle(''); setDate(''); setTime(''); setEndTime(''); setNote(''); setRoom(''); setSubjectCode('');
    setColour('#3b82f6'); setOwner(defaultOwner || (usernames && usernames[0]) || ''); setEditIdx(null);
  };
  // Load an existing exam into the form for editing.
  const loadForEdit = (i) => {
    const ev = (events || [])[i];
    if (!ev) return;
    setEditIdx(i);
    setTitle(ev.title || ''); setDate(ev.date || ''); setTime(ev.time || ''); setEndTime(ev.end_time || '');
    setNote(ev.note || ''); setRoom(ev.room || ''); setSubjectCode(ev.subject_code || '');
    setColour(ev.colour || '#3b82f6'); setOwner((ev.interested || [])[0] || owner);
  };
  // Honour an edit target passed in when the modal is opened from the Exams view.
  React.useEffect(() => { if (initialEditIdx != null) loadForEdit(initialEditIdx); /* eslint-disable-next-line */ }, [initialEditIdx]);

  // Collect unique class codes across all users for the linked-class dropdown
  const allCodes = React.useMemo(() => {
    const set = new Set();
    for (const u in (users || {})) {
      const tt = users[u].timetable || [];
      for (const e of tt) if (e.code_name) set.add(e.code_name);
    }
    return [...set].sort();
  }, [users]);

  // Find the colour of a class with a given code (first match across users)
  const colourForCode = React.useCallback((code) => {
    if (!code) return null;
    for (const u in (users || {})) {
      const tt = users[u].timetable || [];
      if (tt.some(e => e.code_name === code)) return users[u].colour;
    }
    return null;
  }, [users]);

  React.useEffect(() => {
    if (subjectCode) {
      const c = colourForCode(subjectCode);
      if (c) setColour(c);
    }
  }, [subjectCode, colourForCode]);

  const submit = () => {
    const t = title.trim();
    if (!t || !owner) return;
    if (editIdx != null) {
      // Preserve the exam's existing interested list; just move/keep owner at the front.
      const prev = (events || [])[editIdx] || {};
      const rest = (prev.interested || []).filter(n => n !== owner);
      onUpdate(editIdx, { title: t, date, time, end_time: endTime, colour, note: note.trim(),
              type: 'exam', room: room.trim(), subject_code: subjectCode, interested: [owner, ...rest] });
    } else {
      onAdd({ title: t, date, time, end_time: endTime, colour, note: note.trim(),
              interested: [owner], type: 'exam', room: room.trim(), subject_code: subjectCode });
    }
    resetForm();
  };
  const sorted = [...(events || [])].filter(ev => ev.type === 'exam').sort((a, b) => (a.date || '').localeCompare(b.date || ''));
  const grouped = React.useMemo(() => {
    const today0 = new Date(); today0.setHours(0,0,0,0);
    const upcoming = []; const past = [];
    sorted.forEach(ev => {
      const d = ev.date ? new Date(ev.date + 'T00:00:00') : null;
      if (!d || d >= today0) upcoming.push(ev); else past.push(ev);
    });
    return { upcoming, past };
  }, [sorted]);
  const PRESET_COLOURS = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#14b8a6', '#6b7280'];
  const examCount  = (events || []).filter(ev => ev.type === 'exam').length;
  return (
    <Modal title={<><Icon name="clipboard" /> Exams</>} onClose={onClose} wide
      footer={
        <>
          <span className="events-count">{examCount} exam{examCount === 1 ? '' : 's'}</span>
          <button className="tb-btn primary" style={{ marginLeft: 'auto' }} onClick={onClose}>Done</button>
        </>
      }
    >
      <div className="events-layout">
        <section className="events-add">
          <div className="events-add-head">
            <Icon name={editIdx != null ? 'edit' : 'plus'} />
            <span>{editIdx != null ? 'Edit exam' : 'New exam'}</span>
            {editIdx != null && (
              <button className="icon-btn" style={{ marginLeft: 'auto', width: 22, height: 22, color: 'inherit' }}
                title="Cancel edit" onClick={resetForm}><Icon name="x" style={{ width: 12, height: 12 }} /></button>
            )}
          </div>
          <div className="events-add-body">
            <label className="events-add-colour-label" htmlFor="exam-owner-select">For</label>
            <select id="exam-owner-select" className="events-add-link" value={owner} onChange={(e) => setOwner(e.target.value)}>
              {(usernames || []).map(u => <option key={u} value={u}>{u}</option>)}
            </select>
            <input className="events-add-title" value={title} onChange={(e) => setTitle(e.target.value)}
              onKeyDown={(e) => { if (e.key === 'Enter' && title.trim()) submit(); }}
              placeholder="Subject (e.g. Applied Machine Learning)" />
            <div className="events-add-meta three">
              <label className="events-add-field"><Icon name="calendar" /><input type="date" value={date} onChange={(e) => setDate(e.target.value)} /></label>
              <label className="events-add-field"><Icon name="clock" /><input type="time" value={time} onChange={(e) => setTime(e.target.value)} placeholder="start" /></label>
              <label className="events-add-field"><Icon name="clock" /><input type="time" value={endTime} onChange={(e) => setEndTime(e.target.value)} placeholder="end" /></label>
            </div>
            <label className="events-add-field" style={{ width: '100%' }}>
              <Icon name="pin" /><input value={room} onChange={(e) => setRoom(e.target.value)} placeholder="Room (e.g. S.310 SEG)" />
            </label>
            {allCodes.length > 0 && (
              <CodeTypeahead value={subjectCode} onChange={setSubjectCode} options={allCodes} onEnter={() => { if (title.trim()) submit(); }}
                placeholder="Link to a class code (type, ⇥ to fill)…" />
            )}
            <input className="events-add-note" value={note} onChange={(e) => setNote(e.target.value)} placeholder="Prep notes, what to bring…" />
            <div className="events-add-colours">
              <span className="events-add-colour-label">Tag</span>
              <div className="events-add-colour-swatches">
                {PRESET_COLOURS.map(c => (
                  <button key={c} type="button" className={`events-colour-dot ${colour === c ? 'is-active' : ''}`} style={{ background: c }} onClick={() => setColour(c)} aria-label={c} />
                ))}
              </div>
              <button className="tb-btn primary events-add-submit" onClick={submit} disabled={!title.trim() || !owner}>
                <Icon name={editIdx != null ? 'check' : 'plus'} /> {editIdx != null ? 'Save' : 'Add'}
              </button>
            </div>
          </div>
        </section>
        <section className="events-list">
          {sorted.length === 0 && (
            <div className="events-empty"><Icon name="clipboard" /><div>No exams yet. Add your first above.</div></div>
          )}
          {grouped.upcoming.length > 0 && (
            <>
              <h4 className="events-section-label">Upcoming</h4>
              {grouped.upcoming.map((ev) => {
                const i = (events || []).indexOf(ev);
                return <EventCard key={'u' + i} event={ev} idx={i} colour={examColour(ev, users)} isEditing={editIdx === i}
                  onEdit={() => loadForEdit(i)}
                  onDelete={() => onDelete(i)}
                  onAddInterest={(name) => onAddInterest(i, name)}
                  onRemoveInterest={(ni) => onRemoveInterest(i, ni)} />;
              })}
            </>
          )}
          {grouped.past.length > 0 && (
            <>
              <h4 className="events-section-label">Past</h4>
              {grouped.past.map((ev) => {
                const i = (events || []).indexOf(ev);
                return <EventCard key={'p' + i} event={ev} idx={i} faded colour={examColour(ev, users)} isEditing={editIdx === i}
                  onEdit={() => loadForEdit(i)}
                  onDelete={() => onDelete(i)}
                  onAddInterest={(name) => onAddInterest(i, name)}
                  onRemoveInterest={(ni) => onRemoveInterest(i, ni)} />;
              })}
            </>
          )}
        </section>
      </div>
    </Modal>
  );
}

  const [testing, setTesting] = React.useState(false);
  const doTest = async () => {
    if (!url.trim() || !token.trim()) {
      setTest({ kind: 'err', msg: 'Please fill in both fields before testing.' });
      return;
    }
    setTesting(true);
    setTest({ kind: null, msg: 'Testing…' });
    try {
      const r = await fetch(url.trim().replace(/\/$/, '') + '/ping', { headers: { 'X-Save-Token': token.trim() } });
      if (r.ok) setTest({ kind: 'ok', msg: '✓ Connected — server is reachable and the token is correct!' });
      else setTest({ kind: 'err', msg: `✗ Error ${r.status}: ${r.status === 401 ? 'Wrong token.' : 'Server error — check server logs.'}` });
    } catch(e) {
      setTest({ kind: 'err', msg: `✗ Could not reach server: ${e.message}` });
    }
    setTesting(false);
  };
  const save = () => {
    onSave({ url: url.trim().replace(/\/$/, ''), token: token.trim() });
  };
  return (
    <Modal title={<><Icon name="cloud" /> Server connection</>} onClose={onClose}
      footer={
        <>
          <button className="tb-btn" onClick={doTest} disabled={testing}>{testing ? 'Testing…' : 'Test connection'}</button>
          <div style={{ marginLeft: 'auto', display: 'flex', gap: 8 }}>
            <button className="tb-btn" onClick={onClose}>Cancel</button>
            <button className="tb-btn primary" onClick={save}>Save</button>
          </div>
        </>
      }
    >
      <div className="srv-info">
        Configure the Flask server URL and save-token. Once connected, clicking <strong>Save to server</strong> in the toolbar pushes the current state and overwrites <code>timetable.html</code> on the server.
      </div>
      {test.msg && <div className={`srv-test-result ${test.kind || ''}`}>{test.msg}</div>}
      <div className="srv-row">
        <label>Server URL</label>
        <input className="field-input" value={url} onChange={(e) => setUrl(e.target.value)} placeholder="https://yourname.pythonanywhere.com" />
      </div>
      <div className="srv-row">
        <label>Save token</label>
        <input className="field-input" type="password" value={token} onChange={(e) => setToken(e.target.value)} placeholder="Set in SAVE_TOKEN env var on server" />
      </div>
    </Modal>
  );
}

// ─────────────────────────────────────────────
// App
// ─────────────────────────────────────────────
const SRV_LS_KEY   = 'scuffed_server_config';
const DARK_LS_KEY  = 'scuffed_dark';
const DATA_LS_KEY  = 'scuffed_data';

// Read the locally-mirrored data (latest edits, survives offline). null if absent/invalid.
function loadLocalData() {
  try {
    const ls = JSON.parse(localStorage.getItem(DATA_LS_KEY) || 'null');
    if (ls && ls.users && typeof ls.users === 'object') return ls;
  } catch (e) {}
  return null;
}
const VIEW_KEYS    = ['week', 'day', 'bento', 'exams'];
const VIEW_LABEL   = { week: 'Week', day: 'Day', bento: 'Bento', exams: 'Exams' };
const VIEW_ICON    = { week: 'grid', day: 'list', bento: 'bento', exams: 'clipboard' };

// Pristine template used to re-serialize the page on save.
// NOTE: document.documentElement.outerHTML is NOT safe here — Babel-standalone injects
// its compiled <script> into the live DOM, so outerHTML would re-append a compiled copy
// on every save and the file would grow without bound. Instead we fetch the on-disk
// source (one clean copy), falling back to outerHTML only if the fetch fails.
let PRISTINE_HTML = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
fetch(window.location.pathname, { cache: 'no-store' })
  .then(r => (r.ok ? r.text() : null))
  .then(t => { if (t && t.indexOf('id="data-script"') !== -1) PRISTINE_HTML = t; })
  .catch(() => {});

// Mark all users visible on load (runtime-only flag; stripped on export).
(function () {
  if (window.INITIAL_DATA && window.INITIAL_DATA.users) {
    for (const u in window.INITIAL_DATA.users) window.INITIAL_DATA.users[u].visibility = true;
  }
  if (window.INITIAL_DATA && !window.INITIAL_DATA.events) window.INITIAL_DATA.events = [];
})();

function App() {
  const [users, setUsers]   = React.useState(() => {
    const ls = loadLocalData();
    const src = ls ? ls.users : window.INITIAL_DATA.users;
    const copy = JSON.parse(JSON.stringify(src));
    for (const u in copy) copy[u].visibility = true;
    return copy;
  });
  const usernames           = Object.keys(users);
  const [selectedNames, setSelectedNames] = React.useState([usernames[0]]);
  const selected            = selectedNames[0];
  const person              = users[selected];
  const compareMode         = selectedNames.length > 1;
  const selectedPeople      = selectedNames.map(n => [n, users[n]]).filter(([, p]) => p);

  const togglePerson = (name, withModifier) => {
    setSelectedNames(prev => {
      if (!withModifier) return [name];
      if (prev.includes(name)) {
        const next = prev.filter(n => n !== name);
        return next.length ? next : [name];
      }
      return [...prev, name];
    });
  };
  const clearCompare = () => setSelectedNames([selected]);

  const [view, setView]           = React.useState('week');
  const [query, setQuery]         = React.useState('');
  const [dark, setDark]           = React.useState(() => {
    try { return localStorage.getItem(DARK_LS_KEY) !== '0'; } catch (e) { return true; }
  });
  const [collapsed, setCollapsed] = React.useState(false);
  const [logoFailed, setLogoFailed] = React.useState(false);
  const [events, setEvents]       = React.useState(() => {
    const ls = loadLocalData();
    const src = ls ? ls.events : window.INITIAL_DATA.events;
    return Array.isArray(src) ? src : [];
  });

  const [detailIdx, setDetailIdx]   = React.useState(null);
  const [editing, setEditing]       = React.useState(null);
  const [eventsOpen, setEventsOpen] = React.useState(false);
  const [examEdit, setExamEdit]     = React.useState(null);  // index of exam to open in edit mode
  const [exportOpen, setExportOpen] = React.useState(false);
  const [serverOpen, setServerOpen] = React.useState(false);

  const [serverConfig, setServerConfig] = React.useState(() => {
    let cfg = {};
    try { cfg = JSON.parse(localStorage.getItem(SRV_LS_KEY) || '{}'); } catch (e) {}
    // Same-origin by default — no URL/token entry needed to edit directly.
    return { url: cfg.url || window.location.origin, token: cfg.token || '' };
  });
  const [serverStatus, setServerStatus] = React.useState('idle'); // idle | saving | ok | err
  const [serverMsg, setServerMsg] = React.useState('');

  // Live clock: re-render time-dependent UI (progress bars, now-line, floating-now) without a reload.
  const [now, setNow] = React.useState(() => nowMins());
  React.useEffect(() => {
    const id = setInterval(() => setNow(nowMins()), 15000);
    return () => clearInterval(id);
  }, []);

  const t = useTweaks({ accentHue: 25, density: 'comfortable', showFloatingNow: true, blockStyle: 'solid' });

  // ── Autosave: mirror every edit to localStorage immediately, then debounce-push to server ──
  const autosaveTimer = React.useRef(null);
  const autosaveFirst = React.useRef(true);
  const dirtyRef      = React.useRef(false);  // true = local edit not yet confirmed on server
  React.useEffect(() => {
    try {
      localStorage.setItem(DATA_LS_KEY, JSON.stringify({ users: stripVisibility(users), events, savedAt: Date.now() }));
    } catch (e) {}
    if (autosaveFirst.current) { autosaveFirst.current = false; return; }  // no push on initial mount
    dirtyRef.current = true;
    if (autosaveTimer.current) clearTimeout(autosaveTimer.current);
    autosaveTimer.current = setTimeout(() => { pushToServer(); }, 1000);
    return () => { if (autosaveTimer.current) clearTimeout(autosaveTimer.current); };
  }, [users, events, t.accentHue, t.density, t.showFloatingNow, t.blockStyle]);

  // ── Durable flush: if a local edit is still pending when the tab is hidden or closed,
  //    push it synchronously with keepalive so it can't be lost in the debounce window. ──
  React.useEffect(() => {
    const flush = () => {
      if (!dirtyRef.current) return;
      const url = (serverConfig.url || window.location.origin) + '/save';
      const headers = { 'Content-Type': 'text/html; charset=utf-8' };
      if (serverConfig.token) headers['X-Save-Token'] = serverConfig.token;
      try {
        fetch(url, { method: 'POST', headers, body: buildExportHTML(), keepalive: true });
        dirtyRef.current = false;
      } catch (e) {}
    };
    const onVis = () => { if (document.visibilityState === 'hidden') flush(); };
    window.addEventListener('pagehide', flush);
    document.addEventListener('visibilitychange', onVis);
    return () => {
      window.removeEventListener('pagehide', flush);
      document.removeEventListener('visibilitychange', onVis);
    };
  }, [serverConfig, users, events, t.accentHue, t.density, t.showFloatingNow, t.blockStyle]);

  React.useEffect(() => {
    document.body.classList.toggle('dark', dark);
    try { localStorage.setItem(DARK_LS_KEY, dark ? '1' : '0'); } catch (e) {}
  }, [dark]);
  React.useEffect(() => {
    document.documentElement.style.setProperty('--accent', `oklch(0.62 0.18 ${t.accentHue})`);
    document.documentElement.style.setProperty('--accent-soft', `oklch(${dark ? 0.30 : 0.95} ${dark ? 0.06 : 0.04} ${t.accentHue})`);
  }, [t.accentHue, dark]);
  React.useEffect(() => {
    document.body.dataset.blockStyle = t.blockStyle;
    document.body.dataset.density    = t.density;
  }, [t.blockStyle, t.density]);

  // ── Font loader: for each user with font_url, register a FontFace ──
  const [loadedFonts, setLoadedFonts] = React.useState({});
  React.useEffect(() => {
    let cancelled = false;
    (async () => {
      const next = { ...loadedFonts };
      let changed = false;
      for (const u in users) {
        const url = users[u].font_url;
        const family = slugUser(u);
        if (!url) continue;
        if (next[u] === url) continue;
        try {
          document.fonts.forEach(f => { if (f.family === family) document.fonts.delete(f); });
          const face = new FontFace(family, `url("${url}")`);
          await face.load();
          if (cancelled) return;
          document.fonts.add(face);
          next[u] = url;
          changed = true;
        } catch (e) {
          console.warn(`Font load failed for ${u}:`, e.message);
        }
      }
      if (changed && !cancelled) setLoadedFonts(next);
    })();
    return () => { cancelled = true; };
  }, [users]);

  // Decorate person object with _fontFamily so view blockStyle uses it
  const personForView = React.useMemo(() => {
    if (!person) return person;
    if (person.font_url && loadedFonts[selected] === person.font_url) {
      return { ...person, _fontFamily: slugUser(selected) };
    }
    return person;
  }, [person, selected, loadedFonts]);
  const peopleForView = React.useMemo(() => {
    return selectedPeople.map(([n, p]) => {
      if (p.font_url && loadedFonts[n] === p.font_url) return [n, { ...p, _fontFamily: slugUser(n) }];
      return [n, p];
    });
  }, [selectedPeople, loadedFonts]);

  const switchRef = React.useRef(null);
  const [thumbStyle, setThumbStyle] = React.useState({});
  React.useEffect(() => {
    const el = switchRef.current?.querySelector('.view-switch-btn.active');
    if (el && switchRef.current) setThumbStyle({ left: el.offsetLeft, width: el.offsetWidth });
  }, [view, compareMode]);

  const searchRef = React.useRef(null);
  React.useEffect(() => {
    const onKey = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); searchRef.current?.focus(); }
      if (e.key === '/' && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
        e.preventDefault();
        searchRef.current?.focus();
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  const updateUserTimetable = (username, newTimetable) => {
    setUsers(prev => ({ ...prev, [username]: { ...prev[username], timetable: newTimetable } }));
  };
  const onMoveEntry = (entryIdx, newDay, newStartMins) => {
    const tt = [...person.timetable];
    const e = { ...tt[entryIdx] };
    const dur = parseTime(e.end) - parseTime(e.start);
    e.day = newDay;
    e.start = fmtTime(newStartMins);
    e.end   = fmtTime(newStartMins + dur);
    tt[entryIdx] = e;
    updateUserTimetable(selected, tt);
  };

  const handleSavePerson = ({ originalName, newName, person: data, removedAvatar }) => {
    setUsers(prev => {
      const next = { ...prev };
      if (originalName && originalName !== newName) delete next[originalName];
      next[newName] = { ...(prev[originalName] || {}), ...data, visibility: true };
      // Wipe font_url/font_size if cleared
      if (!data.font_url) { delete next[newName].font_url; delete next[newName].font_size; }
      // Avatar URL: set when provided, deleted when explicitly removed
      if (data.avatar_url) next[newName].avatar_url = data.avatar_url;
      else if (removedAvatar) delete next[newName].avatar_url;
      // GIF crop metadata: only valid alongside a current avatar; clear stale values otherwise
      if (data.avatar_pos)  next[newName].avatar_pos  = data.avatar_pos;  else delete next[newName].avatar_pos;
      if (data.avatar_zoom) next[newName].avatar_zoom = data.avatar_zoom; else delete next[newName].avatar_zoom;
      return next;
    });
    if (originalName === selected || !originalName) setSelectedNames([newName]);
    setEditing(null);
  };
  const handleDeletePerson = (username) => {
    if (Object.keys(users).length <= 1) { alert("Can't remove the last person."); return; }
    if (!confirm(`Remove ${username} from the timetable?`)) return;
    setUsers(prev => { const next = { ...prev }; delete next[username]; return next; });
    setSelectedNames([Object.keys(users).filter(u => u !== username)[0]]);
    setEditing(null);
  };

  const jumpToNow = () => {
    const today = todayIdx();
    const n = nowMins();
    const cur = person.timetable.find(e => {
      const s = parseTime(e.start), en = parseTime(e.end);
      return e.day === today + 1 && n >= s && n < en;
    });
    if (cur) setDetailIdx(person.timetable.indexOf(cur));
    else if (view !== 'bento') setView('bento');
  };

  const detailEntry = detailIdx != null ? person.timetable[detailIdx] : null;

  // ── Build a self-contained HTML by patching the pristine template ──
  function buildExportHTML() {
    const { setTweak, ...tweakValues } = t;
    const dataJson   = JSON.stringify({ users: stripVisibility(users), events }, null, 2);
    const tweaksJson = JSON.stringify(tweakValues);
    let html = PRISTINE_HTML;
    html = html.replace(
      /(<script\s+id="data-script">)([\s\S]*?)(<\/script>)/,
      `$1\nwindow.INITIAL_DATA = ${dataJson};\n$3`
    );
    html = html.replace(
      /(<script\s+id="tweaks-data">)([\s\S]*?)(<\/script>)/,
      `$1\nwindow.INITIAL_TWEAKS = ${tweaksJson};\n$3`
    );
    return html;
  }

  async function pushToServer() {
    const url = serverConfig.url || window.location.origin;
    setServerStatus('saving');
    setServerMsg('Saving…');
    try {
      const headers = { 'Content-Type': 'text/html; charset=utf-8' };
      if (serverConfig.token) headers['X-Save-Token'] = serverConfig.token;  // optional
      const res = await fetch(url + '/save', {
        method: 'POST',
        headers,
        body: buildExportHTML(),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      dirtyRef.current = false;  // server confirmed — clear pending flag
      setServerStatus('ok');
      setServerMsg('Saved');
      setTimeout(() => { setServerStatus('idle'); setServerMsg(''); }, 2000);
    } catch (e) {
      setServerStatus('err');
      setServerMsg(e.message);
      setTimeout(() => { setServerStatus('idle'); setServerMsg(''); }, 5000);
    }
  }

  // ── Exports ──
  const downloadDataUrl = (dataUrl, name) => {
    const a = document.createElement('a');
    a.href = dataUrl; a.download = name; a.click();
  };
  const handleExport = (kind) => {
    setExportOpen(false);
    if (kind === 'print') { window.print(); return; }
    if (kind === 'json')  {
      const blob = new Blob([JSON.stringify({ users: stripVisibility(users), events }, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob); a.download = 'timetable.json'; a.click();
      return;
    }
    if (kind === 'html') {
      const blob = new Blob([buildExportHTML()], { type: 'text/html;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob); a.download = 'timetable.html'; a.click();
      return;
    }
    if (kind === 'csv') {
      const esc = (v) => { const s = String(v == null ? '' : v); return /[",\n\r]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s; };
      const rows = [['Day', 'Start', 'End', 'Code', 'Name', 'Classroom', 'Type']];
      [...person.timetable]
        .sort((a, b) => (a.day - b.day) || (parseTime(a.start) - parseTime(b.start)))
        .forEach(e => rows.push([
          DAY_FULL[e.day - 1] || e.day, e.start, e.end, e.code_name || '', e.name || '', e.classroom || '',
          e.break ? 'Break' : e.online ? 'Online' : 'Class',
        ]));
      const csv = rows.map(r => r.map(esc).join(',')).join('\r\n');
      const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob); a.download = `${selected}-timetable.csv`; a.click();
      return;
    }
    // PNG/PDF use html-to-image (SVG foreignObject) — unlike html2canvas it renders
    // modern oklch() colours, which the app uses for the accent.
    if (kind === 'png') {
      const el = document.getElementById('capture-area');
      if (!el || !window.htmlToImage) { alert('html-to-image not loaded'); return; }
      window.htmlToImage.toPng(el, { pixelRatio: 2, backgroundColor: dark ? '#1a1a1f' : '#ffffff' })
        .then(dataUrl => downloadDataUrl(dataUrl, 'group_schedule.png'))
        .catch(err => { console.error(err); alert('PNG export failed: ' + err.message); });
      return;
    }
    if (kind === 'pdf') {
      const el = document.getElementById('capture-area');
      if (!el || !window.htmlToImage || !window.jspdf) { alert('html-to-image / jsPDF not loaded'); return; }
      window.htmlToImage.toPng(el, { pixelRatio: 2, backgroundColor: dark ? '#1a1a1f' : '#ffffff' }).then(dataUrl => {
        const img = new Image();
        img.onload = () => {
          const mmW = img.width  * 25.4 / 192;
          const mmH = img.height * 25.4 / 192;
          const { jsPDF } = window.jspdf;
          const pdf = new jsPDF({ orientation: mmW > mmH ? 'l' : 'p', unit: 'mm', format: [mmW, mmH] });
          pdf.addImage(dataUrl, 'PNG', 0, 0, mmW, mmH);
          pdf.save('group_schedule.pdf');
        };
        img.src = dataUrl;
      }).catch(err => { console.error(err); alert('PDF export failed: ' + err.message); });
      return;
    }
    if (kind === 'ical') {
      const lines = ['BEGIN:VCALENDAR', 'VERSION:2.0', 'PRODID:-//Bento Timetable//EN'];
      const today = new Date();
      const monday = new Date(today);
      monday.setDate(today.getDate() - ((today.getDay() + 6) % 7));
      person.timetable.forEach(e => {
        if (e.break) return;
        const d = new Date(monday); d.setDate(monday.getDate() + (e.day - 1));
        const [sh, sm] = e.start.split('.').map(x => parseInt(x, 10));
        const [eh, em] = e.end.split('.').map(x => parseInt(x, 10));
        const ds = new Date(d); ds.setHours(sh, sm || 0, 0, 0);
        const de = new Date(d); de.setHours(eh, em || 0, 0, 0);
        const fmt = (dt) => dt.toISOString().replace(/[-:]/g, '').replace(/\.\d{3}/, '');
        lines.push('BEGIN:VEVENT', `SUMMARY:${e.name || e.code_name}`, `LOCATION:${e.classroom || ''}`, `DTSTART:${fmt(ds)}`, `DTEND:${fmt(de)}`, 'END:VEVENT');
      });
      lines.push('END:VCALENDAR');
      const blob = new Blob([lines.join('\n')], { type: 'text/calendar' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob); a.download = `${selected}-timetable.ics`; a.click();
    }
  };

  const today = todayIdx();
  const n = now;
  const currentNow = person.timetable.find(e => e.day === today + 1 && n >= parseTime(e.start) && n < parseTime(e.end));

  return (
    <div className={`app ${collapsed ? 'sidebar-collapsed' : ''}`}>
      <aside className="sidebar">
        <div className="sidebar-head">
          <button className="brand brand-toggle" onClick={() => setCollapsed(c => !c)} aria-label="Expand or collapse sidebar" title="Expand / collapse">
            <span className="brand-logo">
              {logoFailed
                ? <Icon name="sidebar" />
                : <img src="/favicon.svg" alt="" draggable="false" onError={() => setLogoFailed(true)} />}
            </span>
            <span className="brand-name">Timetable</span>
          </button>
        </div>

        <div className="sidebar-section-label">
          People
          {compareMode && <span style={{ float: 'right', color: 'var(--accent)', textTransform: 'none', letterSpacing: 0, fontSize: 10 }}>{selectedNames.length} compared</span>}
          {!compareMode && <span style={{ float: 'right', color: 'var(--ink-4)', textTransform: 'none', letterSpacing: 0, fontSize: 9.5, fontWeight: 500 }}>{navigator.platform.includes('Mac') ? '⌘' : 'Ctrl'}-click to compare</span>}
        </div>
        <div className="person-list">
          {usernames.map(u => {
            const p = users[u];
            const inSel = selectedNames.includes(u);
            return (
              <div key={u}
                   className={`person-chip ${u === selected ? 'active' : ''} ${inSel && u !== selected ? 'in-compare' : ''}`}
                   onClick={(e) => togglePerson(u, e.metaKey || e.ctrlKey || e.shiftKey)}
                   title={`${u} — ${navigator.platform.includes('Mac') ? '⌘' : 'Ctrl'}-click to compare`}>
                <PersonAvatar user={p} name={u} className="avatar" style={{ background: p.background_colour, color: p.colour, '--avatar-ring': inSel ? p.colour : 'transparent' }} />
                <div className="person-meta">
                  <div className="person-name">{u}</div>
                  <div className="person-code">{p.code || '—'}</div>
                </div>
              </div>
            );
          })}
          <button className="person-chip" onClick={() => setEditing({ mode: 'add' })} style={{ color: 'var(--ink-3)' }}>
            <div className="avatar" style={{ background: 'var(--paper-2)', border: '1px dashed var(--line-2)' }}>+</div>
            <div className="person-meta"><div className="person-name" style={{ fontWeight: 500 }}>Add person</div></div>
          </button>
        </div>

        <div className="sidebar-section-label">Quick</div>
        <button className="sidebar-btn" onClick={() => setEventsOpen(true)}><Icon name="clipboard" /><span>Exams {events.length ? `· ${events.length}` : ''}</span></button>
        <button className="sidebar-btn" onClick={() => setEditing({ mode: 'edit', name: selected })}><Icon name="edit" /><span>Edit {selected}</span></button>
        <button className="sidebar-btn" onClick={() => setServerOpen(true)}><Icon name="cloud" /><span>Server</span></button>
        <button className="sidebar-btn" onClick={() => window.dispatchEvent(new CustomEvent('twk-open'))}><Icon name="settings" /><span>Tweaks</span></button>

        <div className="sidebar-foot">
          <button className="sidebar-btn" onClick={() => setDark(d => !d)}>
            <Icon name={dark ? 'sun' : 'moon'} /><span>{dark ? 'Light mode' : 'Dark mode'}</span>
          </button>
        </div>
      </aside>

      <main className="main">
        <div className="toolbar">
          <div className="toolbar-title">
            {compareMode ? (
              <>
                <span>Comparing</span>
                <span className="cmp-banner">
                  {selectedNames.length} people
                  <button onClick={clearCompare} style={{ color: 'inherit', display: 'grid', placeItems: 'center', padding: 0, width: 14, height: 14, marginLeft: 2 }} aria-label="Clear">
                    <Icon name="x" style={{ width: 11, height: 11 }} />
                  </button>
                </span>
              </>
            ) : (
              <>
                <span>{selected}</span>
                <span className="pill">{person.code || ''}</span>
              </>
            )}
          </div>

          <div className="view-switch" ref={switchRef} style={{ marginLeft: 16 }}>
            <div className="view-switch-thumb" style={thumbStyle} />
            {VIEW_KEYS.map(k => (
              <button key={k} className={`view-switch-btn ${view === k ? 'active' : ''}`} onClick={() => setView(k)} disabled={compareMode && k !== 'week'} style={compareMode && k !== 'week' ? { opacity: 0.35, cursor: 'not-allowed' } : {}}>
                <Icon name={VIEW_ICON[k]} /> {VIEW_LABEL[k]}
              </button>
            ))}
          </div>

          <div className="search-box" style={{ marginLeft: 12 }}>
            <Icon name="search" />
            <input ref={searchRef} value={query} onChange={(e) => setQuery(e.target.value)} placeholder="Search subjects, rooms, codes…" />
            {!query && <kbd>/</kbd>}
            {query && <button className="icon-btn" style={{ width: 20, height: 20 }} onClick={() => setQuery('')}><Icon name="x" /></button>}
          </div>

          <div className="tb-right">
            <button className={`srv-pill ${serverStatus === 'ok' ? 'is-ok' : serverStatus === 'saving' ? 'is-saving' : serverStatus === 'err' ? 'is-err' : ''}`}
                    onClick={pushToServer} title="Changes save automatically — click to save now">
              <Icon name="cloud" />
              {serverStatus === 'saving' ? 'Saving…'
                : serverStatus === 'ok' ? '✓ Saved'
                : serverStatus === 'err' ? `✗ ${serverMsg}`
                : 'Autosaved'}
            </button>

            <div style={{ position: 'relative' }}>
              <button className="tb-btn" onClick={() => setExportOpen(o => !o)}>
                <Icon name="download" /> Export <Icon name="chevron" style={{ width: 12, height: 12 }} />
              </button>
              <div className={`menu ${exportOpen ? 'open' : ''}`}>
                <button className="menu-item" onClick={() => handleExport('png')}><Icon name="image" /> PNG screenshot</button>
                <button className="menu-item" onClick={() => handleExport('pdf')}><Icon name="file" /> PDF screenshot</button>
                <button className="menu-item" onClick={() => handleExport('print')}><Icon name="image" /> Print / save as PDF</button>
                <button className="menu-item" onClick={() => handleExport('ical')}><Icon name="calendar" /> Calendar (.ics)</button>
                <button className="menu-item" onClick={() => handleExport('csv')}><Icon name="file" /> CSV data</button>
                <button className="menu-item" onClick={() => handleExport('json')}><Icon name="file" /> JSON data</button>
                <button className="menu-item" onClick={() => handleExport('html')}><Icon name="file" /> Self-contained HTML</button>
              </div>
            </div>
            {!compareMode && (
              <button className="tb-btn primary" onClick={() => setEditing({ mode: 'edit', name: selected })}>
                <Icon name="edit" /> Edit
              </button>
            )}
          </div>
        </div>

        <div className="body" key={view + selectedNames.join('|')}>
          <div className="view-fade-enter view-fade-active">
            <div id="capture-area">
              {compareMode
                ? <CompareView people={peopleForView} query={query} density={t.density} />
                : <>
                    {view === 'week'  && <WeekGrid person={personForView} entries={person.timetable} query={query} onBlockClick={(i) => setDetailIdx(i)} onMoveEntry={onMoveEntry} density={t.density} />}
                    {view === 'day'   && <DayList  person={personForView} entries={person.timetable} query={query} onBlockClick={(i) => setDetailIdx(i)} />}
                    {view === 'bento' && <Bento    person={personForView} entries={person.timetable} query={query} events={events} users={users} personName={selected} now={now} onBlockClick={(i) => setDetailIdx(i)} />}
                    {view === 'exams' && <ExamsList events={events} users={users} query={query} selectedNames={selectedNames}
                        onOpenAdd={() => { setExamEdit(null); setEventsOpen(true); }}
                        onEdit={(i) => { setExamEdit(i); setEventsOpen(true); }}
                        onDelete={(i) => setEvents(prev => prev.filter((_, k) => k !== i))} />}
                  </>}
            </div>
          </div>
        </div>
      </main>

      {t.showFloatingNow && currentNow && (
        <button className="floating-now" onClick={jumpToNow}>
          <span className="pulse" />
          <span>Now: <strong style={{ marginLeft: 2 }}>{currentNow.name || currentNow.code_name}</strong></span>
          <span style={{ opacity: 0.6, fontFamily: 'var(--font-mono)', fontSize: 11 }}>· ends {currentNow.end}</span>
        </button>
      )}

      {detailEntry && (
        <BlockDetail entry={detailEntry} person={person} onClose={() => setDetailIdx(null)}
          onEdit={() => { setDetailIdx(null); setEditing({ mode: 'edit', name: selected }); }} />
      )}
      {editing && (
        <EditPerson mode={editing.mode}
          originalName={editing.mode === 'edit' ? editing.name : ''}
          person={editing.mode === 'edit' ? users[editing.name] : null}
          allUsernames={usernames}
          serverConfig={serverConfig}
          onClose={() => setEditing(null)}
          onSave={handleSavePerson}
          onDelete={editing.mode === 'edit' ? () => handleDeletePerson(editing.name) : null}
          onSwitchPerson={(name) => setEditing({ mode: 'edit', name })} />
      )}
      {eventsOpen && (
        <EventsModal events={events} usernames={usernames} users={users} defaultOwner={selected} initialEditIdx={examEdit}
          onClose={() => { setEventsOpen(false); setExamEdit(null); }}
          onAdd={(ev) => setEvents(prev => [...prev, ev])}
          onUpdate={(i, patch) => setEvents(prev => prev.map((ev, k) => k === i ? { ...ev, ...patch } : ev))}
          onDelete={(i) => setEvents(prev => prev.filter((_, k) => k !== i))}
          onAddInterest={(i, n) => setEvents(prev => prev.map((ev, k) => k === i ? { ...ev, interested: [...(ev.interested || []), n] } : ev))}
          onRemoveInterest={(i, ni) => setEvents(prev => prev.map((ev, k) => k === i ? { ...ev, interested: (ev.interested || []).filter((_, x) => x !== ni) } : ev))} />
      )}
      {serverOpen && (
        <ServerModal config={serverConfig} onClose={() => setServerOpen(false)}
          onSave={(cfg) => {
            setServerConfig(cfg);
            try { localStorage.setItem(SRV_LS_KEY, JSON.stringify(cfg)); } catch (e) {}
            setServerOpen(false);
          }} />
      )}

      <TweaksPanel title="Tweaks">
        <TweakSection label="Theme">
          <TweakSelect label="Now accent" value={String(t.accentHue)} onChange={(v) => t.setTweak('accentHue', parseInt(v, 10))}
            options={[
              { value: '15',  label: '🔴 Red' },
              { value: '25',  label: '🟠 Orange' },
              { value: '45',  label: '🟡 Amber' },
              { value: '145', label: '🟢 Green' },
              { value: '220', label: '🔵 Sky' },
              { value: '260', label: '🟣 Indigo' },
              { value: '295', label: '🟪 Violet' },
            ]} />
        </TweakSection>
        <TweakSection label="Behaviour">
          <TweakToggle label="Floating 'Now' chip" value={t.showFloatingNow} onChange={(v) => t.setTweak('showFloatingNow', v)} />
          <TweakRadio label="Block style" value={t.blockStyle} onChange={(v) => t.setTweak('blockStyle', v)}
            options={[{ value: 'solid', label: 'Solid' }, { value: 'outline', label: 'Outline' }]} />
        </TweakSection>
        <TweakSection label="View">
          <TweakRadio label="Density" value={t.density} onChange={(v) => t.setTweak('density', v)}
            options={[{ value: 'comfortable', label: 'Comfy' }, { value: 'compact', label: 'Compact' }]} />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>



</body></html>
